<?xml version="1.0" encoding="UTF-8"?>
<nexus-ui xmlns="https://nexus.dev/ns/ui/1" controller="./ui.ts#AppPage">
  <panel id="main" title="{{projectName}}" fill="true">
    <label text="{greeting}"/>
    <row>
      <label text="Counter: {counter}"/>
      <button label="+" on-click="increment"/>
      <button label="-" on-click="decrement"/>
      <button label="Reset" on-click="reset"/>
    </row>
  </panel>
</nexus-ui>
