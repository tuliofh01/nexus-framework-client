<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 958 602" width="958" height="602">
  <title>Langflow: agent with tools</title>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#585b70"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#585b70"/>
    </marker>
  </defs>
  <rect width="958" height="602" fill="#1e1e2e"/>
  <rect x="0" y="0" width="958" height="44" fill="#181825"/>
  <text x="24" y="28" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">Agent with Tools — Langflow export</text>

  <rect x="48" y="120" width="230" height="85" rx="10" stroke-width="2" fill="#313244" stroke="#a6e3a1"/>
  <text x="64" y="149" font-family="sans-serif" font-size="14" fill="#cdd6f4">💬</text>
  <text x="86" y="151" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">
    <tspan x="86" dy="0">User Input</tspan>
  </text>
  <text x="64" y="171" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">
    <tspan x="64" dy="0">Natural language task from</tspan>
    <tspan x="64" dy="15">user</tspan>
  </text>

  <rect x="342" y="120" width="268" height="88" rx="10" stroke-width="2" fill="#313244" stroke="#89b4fa"/>
  <text x="358" y="149" font-family="sans-serif" font-size="14" fill="#cdd6f4">🧠</text>
  <text x="380" y="151" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">
    <tspan x="380" dy="0">Agent</tspan>
  </text>
  <text x="358" y="171" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">
    <tspan x="358" dy="0">ReAct / tool-calling LLM</tspan>
    <tspan x="358" dy="15">orchestrator</tspan>
  </text>

  <rect x="674" y="120" width="236" height="85" rx="10" stroke-width="2" fill="#313244" stroke="#a6e3a1"/>
  <text x="690" y="149" font-family="sans-serif" font-size="14" fill="#cdd6f4">💬</text>
  <text x="712" y="151" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">
    <tspan x="712" dy="0">Output</tspan>
  </text>
  <text x="690" y="171" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">
    <tspan x="690" dy="0">Synthesized final answer to</tspan>
    <tspan x="690" dy="15">user</tspan>
  </text>

  <rect x="120" y="341" width="198" height="85" rx="10" stroke-width="2" fill="#313244" stroke="#fab387"/>
  <text x="136" y="370" font-family="sans-serif" font-size="14" fill="#cdd6f4">🔧</text>
  <text x="158" y="372" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">
    <tspan x="158" dy="0">Calculator</tspan>
  </text>
  <text x="136" y="392" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">
    <tspan x="136" dy="0">Arithmetic tool</tspan>
    <tspan x="136" dy="15">invocation</tspan>
  </text>

  <rect x="382" y="341" width="198" height="85" rx="10" stroke-width="2" fill="#313244" stroke="#89b4fa"/>
  <text x="398" y="370" font-family="sans-serif" font-size="14" fill="#cdd6f4">🔍</text>
  <text x="420" y="372" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">
    <tspan x="420" dy="0">Web Search</tspan>
  </text>
  <text x="398" y="392" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">
    <tspan x="398" dy="0">Live web lookup</tspan>
    <tspan x="398" dy="15">capability</tspan>
  </text>

  <rect x="644" y="341" width="211" height="85" rx="10" stroke-width="2" fill="#313244" stroke="#cba6f7"/>
  <text x="660" y="370" font-family="sans-serif" font-size="14" fill="#cdd6f4">🐍</text>
  <text x="682" y="372" font-family="sans-serif" font-size="15" font-weight="bold" fill="#cdd6f4">
    <tspan x="682" dy="0">Python REPL</tspan>
  </text>
  <text x="660" y="392" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">
    <tspan x="660" dy="0">Execute code snippets</tspan>
    <tspan x="660" dy="15">safely</tspan>
  </text>

  <line x1="278" y1="162" x2="342" y2="164" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="164" x2="674" y2="162" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M476,208 L219,196 L219,329 L219,341" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M476,208 L481,208 L481,341 L481,341" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M476,208 L749,220 L749,353 L749,341" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>

  <path d="M219,341 Q273,274 476,208" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow-dashed)" stroke-dasharray="6,4"/>
  <path d="M481,341 Q478,274 476,208" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow-dashed)" stroke-dasharray="6,4"/>
  <path d="M749,341 Q686,274 476,208" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow-dashed)" stroke-dasharray="6,4"/>
  <text x="476" y="317" text-anchor="middle" font-family="sans-serif" font-size="12" font-style="italic" fill="#a6adc8">tool result (dashed)</text>

  <rect x="48" y="482" width="862" height="88" rx="10" stroke-width="2" fill="#313244" stroke="#585b70"/>
  <text x="64" y="504" font-family="sans-serif" font-size="13" font-weight="bold" fill="#cdd6f4">Legend — solid = request, dashed = tool result</text>
  <rect x="64" y="506" width="16" height="16" rx="6" stroke-width="2" fill="#313244" stroke="#a6e3a1"/>
  <text x="86" y="518" font-family="sans-serif" font-size="12" fill="#585b70">I/O — message in, answer out</text>
  <rect x="495" y="506" width="16" height="16" rx="6" stroke-width="2" fill="#313244" stroke="#89b4fa"/>
  <text x="517" y="518" font-family="sans-serif" font-size="12" fill="#585b70">Agent — orchestrates tool calls</text>
  <rect x="64" y="528" width="16" height="16" rx="6" stroke-width="2" fill="#313244" stroke="#fab387"/>
  <text x="86" y="540" font-family="sans-serif" font-size="12" fill="#585b70">Tool — callable capability</text>
</svg>
