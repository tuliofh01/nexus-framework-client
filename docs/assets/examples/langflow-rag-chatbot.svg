<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1620 500" width="1620" height="500">
  <title>Langflow: RAG chatbot flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1620" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="220" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="146" class="icon">&#xf075;</text>
  <text x="76" y="148" class="label">
    <tspan x="76" dy="0">Chat Input</tspan>
  </text>
  <text x="54" y="167" class="desc">
    <tspan x="54" dy="0">User-facing message entry</tspan>
    <tspan x="54" dy="14">point</tspan>
  </text>
  <rect x="220" y="120" width="220" height="78" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="234" y="146" class="icon">&#xf15b;</text>
  <text x="256" y="148" class="label">
    <tspan x="256" dy="0">PDF Loader</tspan>
  </text>
  <text x="234" y="167" class="desc">
    <tspan x="234" dy="0">Ingests documents into</tspan>
    <tspan x="234" dy="14">pipeline</tspan>
  </text>
  <rect x="400" y="120" width="183" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="414" y="146" class="icon">&#xf121;</text>
  <text x="436" y="148" class="label">
    <tspan x="436" dy="0">Text Splitter</tspan>
  </text>
  <text x="414" y="167" class="desc">
    <tspan x="414" dy="0">Chunks text for embedding</tspan>
  </text>
  <rect x="580" y="120" width="168" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="594" y="146" class="icon">&#xf080;</text>
  <text x="616" y="148" class="label">
    <tspan x="616" dy="0">Embeddings</tspan>
  </text>
  <text x="594" y="167" class="desc">
    <tspan x="594" dy="0">Vectorizes text chunks</tspan>
  </text>
  <rect x="760" y="120" width="214" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="774" y="146" class="icon">&#xf1c0;</text>
  <text x="796" y="148" class="label">
    <tspan x="796" dy="0">Vector Store</tspan>
  </text>
  <text x="774" y="167" class="desc">
    <tspan x="774" dy="0">Persists vectors for retrieval</tspan>
  </text>
  <rect x="940" y="120" width="220" height="78" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="954" y="146" class="icon">&#xf002;</text>
  <text x="976" y="148" class="label">
    <tspan x="976" dy="0">Retriever</tspan>
  </text>
  <text x="954" y="167" class="desc">
    <tspan x="954" dy="0">Similarity search at query</tspan>
    <tspan x="954" dy="14">time</tspan>
  </text>
  <rect x="1120" y="120" width="207" height="78" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1134" y="146" class="icon">&#xf544;</text>
  <text x="1156" y="148" class="label">
    <tspan x="1156" dy="0">LLM</tspan>
  </text>
  <text x="1134" y="167" class="desc">
    <tspan x="1134" dy="0">Generates answer from</tspan>
    <tspan x="1134" dy="14">context</tspan>
  </text>
  <rect x="1280" y="120" width="176" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="1294" y="146" class="icon">&#xf075;</text>
  <text x="1316" y="148" class="label">
    <tspan x="1316" dy="0">Chat Output</tspan>
  </text>
  <text x="1294" y="167" class="desc">
    <tspan x="1294" dy="0">Returns response to</tspan>
    <tspan x="1294" dy="14">user</tspan>
  </text>

  <line x1="208" y1="156" x2="220" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="388" y1="156" x2="400" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="568" y1="156" x2="580" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="748" y1="156" x2="760" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="928" y1="156" x2="940" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1108" y1="156" x2="1120" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1288" y1="156" x2="1280" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M110,184 Q110,240 910,240 910,184" fill="none" stroke="#90A4AE" stroke-width="1.5" stroke-dasharray="8,5" marker-end="url(#arrow)"/>
  <text x="510" y="258" text-anchor="middle" class="desc">user query shortcut at chat time</text>

  <rect x="40" y="300" width="1440" height="110" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="322" class="legend-title">Node categories</text>
  <rect x="56" y="324" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="336" class="small">I/O — user-facing input and output</text>
  <rect x="776" y="324" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="798" y="336" class="small">Loader — ingest documents</text>
  <rect x="56" y="346" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="78" y="358" class="small">Model — embeddings and LLM inference</text>
  <rect x="776" y="346" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="798" y="358" class="small">Memory — vector database persistence</text>
  <rect x="56" y="368" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="78" y="380" class="small">Retriever — similarity search</text>
</svg>