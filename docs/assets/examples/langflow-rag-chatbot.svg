<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2024 446" width="2024" height="446">
  <title>Langflow: RAG chatbot flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="2024" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="220" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="146" class="icon">&#xf075;</text>
  <text x="76" y="148" class="label">
    <tspan x="76" dy="0">Chat Input</tspan>
  </text>
  <text x="54" y="167" class="desc">
    <tspan x="54" dy="0">User-facing message entry</tspan>
    <tspan x="54" dy="14">point</tspan>
  </text>
  <rect x="308" y="120" width="220" height="78" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="322" y="146" class="icon">&#xf15b;</text>
  <text x="344" y="148" class="label">
    <tspan x="344" dy="0">PDF Loader</tspan>
  </text>
  <text x="322" y="167" class="desc">
    <tspan x="322" dy="0">Ingests documents into</tspan>
    <tspan x="322" dy="14">pipeline</tspan>
  </text>
  <rect x="576" y="120" width="183" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="590" y="146" class="icon">&#xf121;</text>
  <text x="612" y="148" class="label">
    <tspan x="612" dy="0">Text Splitter</tspan>
  </text>
  <text x="590" y="167" class="desc">
    <tspan x="590" dy="0">Chunks text for embedding</tspan>
  </text>
  <rect x="807" y="120" width="168" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="821" y="146" class="icon">&#xf080;</text>
  <text x="843" y="148" class="label">
    <tspan x="843" dy="0">Embeddings</tspan>
  </text>
  <text x="821" y="167" class="desc">
    <tspan x="821" dy="0">Vectorizes text chunks</tspan>
  </text>
  <rect x="1023" y="120" width="214" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1037" y="146" class="icon">&#xf1c0;</text>
  <text x="1059" y="148" class="label">
    <tspan x="1059" dy="0">Vector Store</tspan>
  </text>
  <text x="1037" y="167" class="desc">
    <tspan x="1037" dy="0">Persists vectors for retrieval</tspan>
  </text>
  <rect x="1285" y="120" width="220" height="78" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1299" y="146" class="icon">&#xf002;</text>
  <text x="1321" y="148" class="label">
    <tspan x="1321" dy="0">Retriever</tspan>
  </text>
  <text x="1299" y="167" class="desc">
    <tspan x="1299" dy="0">Similarity search at query</tspan>
    <tspan x="1299" dy="14">time</tspan>
  </text>
  <rect x="1553" y="120" width="207" height="78" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1567" y="146" class="icon">&#xf544;</text>
  <text x="1589" y="148" class="label">
    <tspan x="1589" dy="0">LLM</tspan>
  </text>
  <text x="1567" y="167" class="desc">
    <tspan x="1567" dy="0">Generates answer from</tspan>
    <tspan x="1567" dy="14">context</tspan>
  </text>
  <rect x="1808" y="120" width="176" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="1822" y="146" class="icon">&#xf075;</text>
  <text x="1844" y="148" class="label">
    <tspan x="1844" dy="0">Chat Output</tspan>
  </text>
  <text x="1822" y="167" class="desc">
    <tspan x="1822" dy="0">Returns response to</tspan>
    <tspan x="1822" dy="14">user</tspan>
  </text>
  <line x1="260" y1="159" x2="308" y2="159" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="528" y1="159" x2="576" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="759" y1="156" x2="807" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="975" y1="156" x2="1023" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1237" y1="156" x2="1285" y2="159" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1505" y1="159" x2="1553" y2="159" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1760" y1="159" x2="1808" y2="159" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M150,198 Q892,198 1395,198" fill="none" stroke="#90A4AE" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="8,5"/>
  <text x="772" y="288" text-anchor="middle" class="desc">user query shortcut at chat time</text>
  <rect x="40" y="286" width="1944" height="110" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="308" class="legend-title">Node categories</text>
  <rect x="56" y="310" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="322" class="small">I/O — user-facing input and output</text>
  <rect x="1028" y="310" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1050" y="322" class="small">Loader — ingest documents</text>
  <rect x="56" y="332" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="78" y="344" class="small">Model — embeddings and LLM inference</text>
  <rect x="1028" y="332" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1050" y="344" class="small">Memory — vector database persistence</text>
  <rect x="56" y="354" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="78" y="366" class="small">Retriever — similarity search</text>
</svg>