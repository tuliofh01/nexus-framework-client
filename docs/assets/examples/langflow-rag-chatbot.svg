<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1520 460" width="1520" height="460">
  <title>Langflow Example — RAG Chatbot</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .title { font: bold 22px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1a1a2e; }
      .subtitle { font: 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #455A64; }
      .label { font: 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1520" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <text x="760" y="38" text-anchor="middle" class="title">Langflow Example — RAG Chatbot</text>
  <text x="760" y="58" text-anchor="middle" class="subtitle">Classic retrieval-augmented generation pipeline (runtime LLM flow)</text>
  <rect x="40" y="120" width="140" height="64" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="52" y="142" class="icon">&#xf075;</text>
  <text x="74" y="142" class="label">Chat Input</text>
  <text x="52" y="174" class="desc">User-facing message entry point</text>
  <rect x="200" y="120" width="140" height="64" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="212" y="142" class="icon">&#xf15b;</text>
  <text x="234" y="142" class="label">PDF Loader</text>
  <text x="212" y="174" class="desc">Ingests documents into pipeline</text>
  <rect x="360" y="120" width="140" height="64" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="372" y="142" class="icon">&#xf121;</text>
  <text x="394" y="142" class="label">Text Splitter</text>
  <text x="372" y="174" class="desc">Chunks text for embedding</text>
  <rect x="520" y="120" width="140" height="64" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="532" y="142" class="icon">&#xf080;</text>
  <text x="554" y="142" class="label">Embeddings</text>
  <text x="532" y="174" class="desc">Vectorizes text chunks</text>
  <rect x="680" y="120" width="140" height="64" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="692" y="142" class="icon">&#xf1c0;</text>
  <text x="714" y="142" class="label">Vector Store</text>
  <text x="692" y="174" class="desc">Persists vectors for retrieval</text>
  <rect x="840" y="120" width="140" height="64" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="852" y="142" class="icon">&#xf002;</text>
  <text x="874" y="142" class="label">Retriever</text>
  <text x="852" y="174" class="desc">Similarity search at query time</text>
  <rect x="1000" y="120" width="140" height="64" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1012" y="142" class="icon">&#xf544;</text>
  <text x="1034" y="142" class="label">LLM</text>
  <text x="1012" y="174" class="desc">Generates answer from context</text>
  <rect x="1160" y="120" width="140" height="64" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="1172" y="142" class="icon">&#xf075;</text>
  <text x="1194" y="142" class="label">Chat Output</text>
  <text x="1172" y="174" class="desc">Returns response to user</text>

  <line x1="180" y1="152" x2="200" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="152" x2="360" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="500" y1="152" x2="520" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="152" x2="680" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="820" y1="152" x2="840" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="980" y1="152" x2="1000" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <line x1="1140" y1="152" x2="1160" y2="152" stroke="#37474F" stroke-width="3.5" marker-end="url(#arrow)"/>
  <path d="M110,184 Q110,240 910,240 910,184" fill="none" stroke="#90A4AE" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrow)"/>
  <text x="510" y="258" text-anchor="middle" class="desc">user query shortcut at chat time</text>

  <rect x="40" y="300" width="1440" height="110" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="322" class="legend-title">Node categories</text>
  <rect x="56" y="324" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="336" class="small">I/O — user-facing input and output</text>
  <rect x="776" y="324" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="798" y="336" class="small">Loader — ingest documents</text>
  <rect x="56" y="346" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="78" y="358" class="small">Model — embeddings and LLM inference</text>
  <rect x="776" y="346" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="798" y="358" class="small">Memory — vector database persistence</text>
  <rect x="56" y="368" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="78" y="380" class="small">Retriever — similarity search</text>
</svg>