<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2176 551" width="2176" height="551">
  <title>Langflow: RAG chatbot flow</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="2176" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <rect x="48" y="120" width="230" height="85" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="64" y="149" class="icon">&#xf075;</text>
  <text x="86" y="151" class="label">
    <tspan x="86" dy="0">Chat Input</tspan>
  </text>
  <text x="64" y="171" class="desc">
    <tspan x="64" dy="0">User-facing message entry</tspan>
    <tspan x="64" dy="15">point</tspan>
  </text>
  <rect x="334" y="120" width="230" height="85" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="350" y="149" class="icon">&#xf15b;</text>
  <text x="372" y="151" class="label">
    <tspan x="372" dy="0">PDF Loader</tspan>
  </text>
  <text x="350" y="171" class="desc">
    <tspan x="350" dy="0">Ingests documents into</tspan>
    <tspan x="350" dy="15">pipeline</tspan>
  </text>
  <rect x="620" y="120" width="192" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="636" y="149" class="icon">&#xf121;</text>
  <text x="658" y="151" class="label">
    <tspan x="658" dy="0">Text Splitter</tspan>
  </text>
  <text x="636" y="171" class="desc">
    <tspan x="636" dy="0">Chunks text for embedding</tspan>
  </text>
  <rect x="868" y="120" width="180" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="884" y="149" class="icon">&#xf080;</text>
  <text x="906" y="151" class="label">
    <tspan x="906" dy="0">Embeddings</tspan>
  </text>
  <text x="884" y="171" class="desc">
    <tspan x="884" dy="0">Vectorizes text chunks</tspan>
  </text>
  <rect x="1104" y="120" width="224" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1120" y="149" class="icon">&#xf1c0;</text>
  <text x="1142" y="151" class="label">
    <tspan x="1142" dy="0">Vector Store</tspan>
  </text>
  <text x="1120" y="171" class="desc">
    <tspan x="1120" dy="0">Persists vectors for retrieval</tspan>
  </text>
  <rect x="1384" y="120" width="230" height="85" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1400" y="149" class="icon">&#xf002;</text>
  <text x="1422" y="151" class="label">
    <tspan x="1422" dy="0">Retriever</tspan>
  </text>
  <text x="1400" y="171" class="desc">
    <tspan x="1400" dy="0">Similarity search at query</tspan>
    <tspan x="1400" dy="15">time</tspan>
  </text>
  <rect x="1670" y="120" width="217" height="85" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1686" y="149" class="icon">&#xf544;</text>
  <text x="1708" y="151" class="label">
    <tspan x="1708" dy="0">LLM</tspan>
  </text>
  <text x="1686" y="171" class="desc">
    <tspan x="1686" dy="0">Generates answer from</tspan>
    <tspan x="1686" dy="15">context</tspan>
  </text>
  <rect x="1943" y="120" width="185" height="85" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="1959" y="149" class="icon">&#xf075;</text>
  <text x="1981" y="151" class="label">
    <tspan x="1981" dy="0">Chat Output</tspan>
  </text>
  <text x="1959" y="171" class="desc">
    <tspan x="1959" dy="0">Returns response to</tspan>
    <tspan x="1959" dy="15">user</tspan>
  </text>
  <line x1="278" y1="162" x2="334" y2="162" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="564" y1="162" x2="620" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="812" y1="156" x2="868" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1048" y1="156" x2="1104" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1328" y1="156" x2="1384" y2="162" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1614" y1="162" x2="1670" y2="162" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1887" y1="162" x2="1943" y2="162" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M163,205 C163,305 1499,305 1499,205" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow-dashed)" stroke-dasharray="6,4"/>
  <text x="831" y="297" text-anchor="middle" class="desc">user query shortcut at chat time</text>
  <rect x="48" y="381" width="2080" height="110" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="64" y="403" class="legend-title">Node categories</text>
  <rect x="64" y="405" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="86" y="417" class="small">I/O — user-facing input and output</text>
  <rect x="1104" y="405" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1126" y="417" class="small">Loader — ingest documents</text>
  <rect x="64" y="427" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="86" y="439" class="small">Model — embeddings and LLM inference</text>
  <rect x="1104" y="427" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1126" y="439" class="small">Memory — vector database persistence</text>
  <rect x="64" y="449" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="86" y="461" class="small">Retriever — similarity search</text>
</svg>