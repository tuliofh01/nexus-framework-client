<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" width="1100" height="560">
  <title>Nexus Blueprint - App Structure (Design-Time)</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#37474F"/>
    </marker>
    <style>
      .title { font: bold 20px Verdana, sans-serif; fill: #1a1a1a; }
      .subtitle { font: 13px Verdana, sans-serif; fill: #455A64; }
      .label { font: 12px Verdana, sans-serif; fill: #263238; }
      .mono { font: 11px Consolas, monospace; fill: #263238; }
      .small { font: 10px Verdana, sans-serif; fill: #546E7A; }
      .legend-title { font: bold 11px Verdana, sans-serif; fill: #37474F; }
      .badge { font: bold 10px Verdana, sans-serif; fill: #1565C0; }
      .node { rx: 8; stroke-width: 1.5; }
      .legend-box { rx: 4; stroke-width: 1; }
      .panel { fill: #FAFAFA; stroke: #B0BEC5; stroke-width: 1.2; rx: 8; }
    </style>
  </defs>

  <rect width="1100" height="560" fill="#FFFFFF"/>
  <text x="550" y="34" text-anchor="middle" class="title">Nexus Blueprint - App Structure</text>
  <text x="550" y="56" text-anchor="middle" class="subtitle">Langflow mental model translated to design-time MVC wiring in blueprint.json</text>

  <rect x="400" y="68" width="300" height="24" fill="#E3F2FD" stroke="#1565C0" stroke-width="1" rx="12"/>
  <text x="550" y="84" text-anchor="middle" class="badge">DESIGN-TIME - consumed at generation, not runtime webhooks</text>

  <rect x="60" y="110" width="980" height="250" class="panel"/>
  <text x="80" y="132" class="small">blueprint.json graph (author in :app Blueprint Editor)</text>

  <rect x="100" y="170" width="150" height="56" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="175" y="194" text-anchor="middle" class="mono">ui.page</text>
  <text x="175" y="212" text-anchor="middle" class="small">ImGui + TS/XHTML DSL</text>

  <rect x="310" y="170" width="170" height="56" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="395" y="194" text-anchor="middle" class="mono">cpp.controller</text>
  <text x="395" y="212" text-anchor="middle" class="small">command + data routing</text>

  <rect x="540" y="170" width="150" height="56" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="615" y="194" text-anchor="middle" class="mono">cpp.model</text>
  <text x="615" y="212" text-anchor="middle" class="small">state + domain logic</text>

  <rect x="760" y="140" width="160" height="56" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="840" y="164" text-anchor="middle" class="mono">python.module</text>
  <text x="840" y="182" text-anchor="middle" class="small">samples, ML, glue</text>

  <rect x="760" y="230" width="160" height="56" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="840" y="254" text-anchor="middle" class="mono">lua.script</text>
  <text x="840" y="272" text-anchor="middle" class="small">panels, sol2 bindings</text>

  <line x1="250" y1="198" x2="310" y2="198" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="280" y="188" text-anchor="middle" class="small">events</text>

  <line x1="480" y1="198" x2="540" y2="198" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="188" text-anchor="middle" class="small">commands</text>

  <line x1="690" y1="188" x2="760" y2="168" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="720" y="168" class="small">data</text>

  <line x1="690" y1="208" x2="760" y2="258" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="720" y="248" class="small">data</text>

  <rect x="100" y="310" width="340" height="36" fill="#FFFFFF" stroke="#90A4AE" stroke-width="1" stroke-dasharray="4,3" rx="6"/>
  <text x="270" y="332" text-anchor="middle" class="small">Not shown: external n8n webhooks (ops glue at the app edge)</text>

  <line x1="550" y1="360" x2="550" y2="390" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="550" y="378" text-anchor="middle" class="badge">:core ProjectGenerator</text>

  <rect x="380" y="400" width="340" height="44" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5" rx="8"/>
  <text x="550" y="427" text-anchor="middle" class="label">builds/framework/&lt;name&gt;/ - compiled SDL3 desktop or Android APK</text>

  <rect x="60" y="460" width="980" height="80" fill="#FAFAFA" stroke="#B0BEC5" stroke-width="1.2" rx="8"/>
  <text x="80" y="484" class="legend-title">Legend - Nexus node types (blueprint.json)</text>

  <rect x="80" y="496" width="14" height="14" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="102" y="507" class="small">ui.page - screens and DSL layout</text>

  <rect x="300" y="496" width="14" height="14" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="322" y="507" class="small">cpp.controller - MVC command layer</text>

  <rect x="560" y="496" width="14" height="14" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="582" y="507" class="small">cpp.model - domain state</text>

  <rect x="80" y="518" width="14" height="14" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="102" y="529" class="small">python.module - Python logic via pybind11 / Chaquopy</text>

  <rect x="460" y="518" width="14" height="14" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="482" y="529" class="small">lua.script - Lua panels via sol2</text>
</svg>
