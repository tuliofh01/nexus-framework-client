<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 600" width="1140" height="600">
  <title>Nexus blueprint app structure</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1140" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <rect x="380" y="72" width="380" height="28" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="14"/>
  <text x="570" y="91" text-anchor="middle" class="badge">DESIGN-TIME — consumed at generation, not runtime webhooks</text>

  <rect x="60" y="110" width="1020" height="280" class="panel" fill="#FAFAFA" stroke="#B0BEC5" fill-opacity="0.35"/>
  <text x="74" y="134" class="layer-label">&#xf126; blueprint.json graph (author in :app Blueprint Editor)</text>

  <rect x="100" y="170" width="214" height="80" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="114" y="196" class="icon">&#xf5fd;</text>
  <text x="136" y="198" class="mono">
    <tspan x="136" dy="0">ui.page</tspan>
  </text>
  <text x="114" y="217" class="desc">
    <tspan x="114" dy="0">ImGui screens via TS/XHTML DSL</tspan>
  </text>
  <rect x="320" y="170" width="214" height="80" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="334" y="196" class="icon">&#xf013;</text>
  <text x="356" y="198" class="mono">
    <tspan x="356" dy="0">cpp.controller</tspan>
  </text>
  <text x="334" y="217" class="desc">
    <tspan x="334" dy="0">Routes commands and data ports</tspan>
  </text>
  <rect x="560" y="170" width="220" height="80" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="574" y="196" class="icon">&#xf1c0;</text>
  <text x="596" y="198" class="mono">
    <tspan x="596" dy="0">cpp.model</tspan>
  </text>
  <text x="574" y="217" class="desc">
    <tspan x="574" dy="0">Domain state and business</tspan>
    <tspan x="574" dy="14">logic</tspan>
  </text>
  <rect x="780" y="140" width="200" height="80" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="794" y="166" class="icon">&#xe73c;</text>
  <text x="816" y="168" class="mono">
    <tspan x="816" dy="0">python.module</tspan>
  </text>
  <text x="794" y="187" class="desc">
    <tspan x="794" dy="0">ML samples and glue code</tspan>
  </text>
  <rect x="780" y="240" width="200" height="80" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="794" y="266" class="icon">&#xf120;</text>
  <text x="816" y="268" class="mono">
    <tspan x="816" dy="0">lua.script</tspan>
  </text>
  <text x="794" y="287" class="desc">
    <tspan x="794" dy="0">sol2 panel bindings</tspan>
  </text>

  <line x1="260" y1="204" x2="310" y2="204" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="285" y="194" text-anchor="middle" class="desc">events</text>
  <line x1="490" y1="204" x2="540" y2="204" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="515" y="194" text-anchor="middle" class="desc">commands</text>
  <line x1="700" y1="190" x2="760" y2="174" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="730" y="168" class="desc">data</text>
  <line x1="700" y1="218" x2="760" y2="264" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="100" y="320" width="360" height="40" fill="#FFFFFF" stroke="#90A4AE" stroke-width="2" stroke-dasharray="6,4" rx="8"/>
  <text x="280" y="345" text-anchor="middle" class="desc">Not shown: external n8n webhooks (ops glue at app edge)</text>

  <line x1="570" y1="390" x2="570" y2="420" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="570" y="412" text-anchor="middle" class="badge">:core ProjectGenerator</text>

  <rect x="380" y="430" width="400" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="394" y="456" class="icon">&#xf466;</text>
  <text x="416" y="458" class="label">
    <tspan x="416" dy="0">builds/framework/&amp;lt;name&amp;gt;/</tspan>
  </text>
  <text x="394" y="477" class="desc">
    <tspan x="394" dy="0">Compiled SDL3 desktop or Android APK</tspan>
  </text>

  <rect x="60" y="510" width="1020" height="110" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="76" y="532" class="legend-title">Nexus node types (blueprint.json)</text>
  <rect x="76" y="534" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="98" y="546" class="small">ui.page — screens and DSL layout</text>
  <rect x="586" y="534" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="608" y="546" class="small">cpp.controller — MVC command layer</text>
  <rect x="76" y="556" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="98" y="568" class="small">cpp.model — domain state</text>
  <rect x="586" y="556" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="608" y="568" class="small">python.module — pybind11 / Chaquopy</text>
  <rect x="76" y="578" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="98" y="590" class="small">lua.script — sol2 panels</text>
</svg>