<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1206 754" width="1206" height="754">
  <title>Nexus blueprint app structure</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1206" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>

  <rect x="393" y="72" width="420" height="28" fill="#E3F2FD" stroke="#1565C0" stroke-width="2" rx="14"/>
  <text x="603" y="91" text-anchor="middle" class="badge">DESIGN-TIME — consumed at generation, not runtime webhooks</text>

  <rect x="48" y="110" width="1110" height="304" class="panel" fill="#FAFAFA" stroke="#B0BEC5" fill-opacity="0.35"/>
  <text x="62" y="134" class="layer-label">&#xf126; blueprint.json graph (author in :app Blueprint Editor)</text>
  <rect x="80" y="166" width="224" height="80" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="96" y="195" class="icon">&#xf5fd;</text>
  <text x="118" y="197" class="mono">
    <tspan x="118" dy="0">ui.page</tspan>
  </text>
  <text x="96" y="217" class="desc">
    <tspan x="96" dy="0">ImGui screens via TS/XHTML DSL</tspan>
  </text>
  <rect x="360" y="166" width="224" height="80" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="376" y="195" class="icon">&#xf013;</text>
  <text x="398" y="197" class="mono">
    <tspan x="398" dy="0">cpp.controller</tspan>
  </text>
  <text x="376" y="217" class="desc">
    <tspan x="376" dy="0">Routes commands and data ports</tspan>
  </text>
  <rect x="640" y="166" width="230" height="85" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="656" y="195" class="icon">&#xf1c0;</text>
  <text x="678" y="197" class="mono">
    <tspan x="678" dy="0">cpp.model</tspan>
  </text>
  <text x="656" y="217" class="desc">
    <tspan x="656" dy="0">Domain state and business</tspan>
    <tspan x="656" dy="15">logic</tspan>
  </text>
  <rect x="926" y="166" width="200" height="80" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="942" y="195" class="icon">&#xe73c;</text>
  <text x="964" y="197" class="mono">
    <tspan x="964" dy="0">python.module</tspan>
  </text>
  <text x="942" y="217" class="desc">
    <tspan x="942" dy="0">ML samples and glue code</tspan>
  </text>
  <rect x="926" y="302" width="200" height="80" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="942" y="331" class="icon">&#xf120;</text>
  <text x="964" y="333" class="mono">
    <tspan x="964" dy="0">lua.script</tspan>
  </text>
  <text x="942" y="353" class="desc">
    <tspan x="942" dy="0">sol2 panel bindings</tspan>
  </text>

  <line x1="304" y1="206" x2="360" y2="206" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="332" y="200" text-anchor="middle" class="small">events</text>
  <line x1="584" y1="206" x2="640" y2="208" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="612" y="201" text-anchor="middle" class="small">commands</text>
  <line x1="858" y1="208" x2="914" y2="206" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="886" y="201" text-anchor="middle" class="small">data</text>
  <path d="M870,208 Q950,275 926,342" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="80" y="430" width="1046" height="40" fill="#FFFFFF" stroke="#64748b" stroke-width="2" stroke-dasharray="6,4" rx="8"/>
  <text x="603" y="454" text-anchor="middle" class="desc">Not shown: external n8n webhooks (ops glue at app edge)</text>
  <line x1="603" y1="470" x2="603" y2="526" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="603" y="498" text-anchor="middle" class="badge">:core ProjectGenerator</text>
  <rect x="403" y="526" width="400" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="419" y="555" class="icon">&#xf466;</text>
  <text x="441" y="557" class="mono">
    <tspan x="441" dy="0">builds/framework/&amp;lt;name&amp;gt;/</tspan>
  </text>
  <text x="419" y="577" class="desc">
    <tspan x="419" dy="0">Compiled SDL3 desktop or Android APK</tspan>
  </text>

  <rect x="48" y="654" width="1110" height="110" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="64" y="676" class="legend-title">Nexus node types (blueprint.json)</text>
  <rect x="64" y="678" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="86" y="690" class="small">ui.page — screens and DSL layout</text>
  <rect x="619" y="678" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="641" y="690" class="small">cpp.controller — MVC command layer</text>
  <rect x="64" y="700" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="86" y="712" class="small">cpp.model — domain state</text>
  <rect x="619" y="700" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="641" y="712" class="small">python.module — pybind11 / Chaquopy</text>
  <rect x="64" y="722" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="86" y="734" class="small">lua.script — sol2 panels</text>
</svg>