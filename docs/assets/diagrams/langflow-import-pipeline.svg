<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 446 724" width="446" height="724">
  <title>Langflow import pipeline</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="446" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>

  <rect x="40" y="180" width="224" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="56" y="209" class="icon">&#xf544;</text>
  <text x="78" y="211" class="label">
    <tspan x="78" dy="0">Langflow JSON</tspan>
  </text>
  <text x="56" y="231" class="desc">
    <tspan x="56" dy="0">Export from Langflow API or UI</tspan>
  </text>
  <rect x="320" y="180" width="243" height="85" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="336" y="209" class="icon">&#xf15b;</text>
  <text x="358" y="211" class="label">
    <tspan x="358" dy="0">JSON parser</tspan>
  </text>
  <text x="336" y="231" class="desc">
    <tspan x="336" dy="0">Deserialize ReactFlow</tspan>
    <tspan x="336" dy="15">nodes/edges</tspan>
  </text>

  <rect x="583" y="180" width="520" height="277" class="panel" fill="#FFF8E1" stroke="#F57F17" fill-opacity="0.35"/>
  <text x="597" y="204" class="layer-label">&#xf013; LangflowTransformationEngine (v0.3.0)</text>
  <rect x="603" y="220" width="352" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="619" y="249" class="icon">&#xf013;</text>
  <text x="641" y="251" class="label">
    <tspan x="641" dy="0">Trigger inference</tspan>
  </text>
  <text x="619" y="271" class="desc">
    <tspan x="619" dy="0">ChatInputâ†’manual, Webhookâ†’event, Scheduleâ†’interval</tspan>
  </text>
  <rect x="985" y="220" width="262" height="85" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="1001" y="249" class="icon">&#xf126;</text>
  <text x="1023" y="251" class="label">
    <tspan x="1023" dy="0">Topological sort</tspan>
  </text>
  <text x="1001" y="271" class="desc">
    <tspan x="1001" dy="0">Resolve edge order â†’ ordered</tspan>
    <tspan x="1001" dy="15">steps[]</tspan>
  </text>
  <rect x="603" y="348" width="281" height="85" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="619" y="377" class="icon">&#xf121;</text>
  <text x="641" y="379" class="label">
    <tspan x="641" dy="0">Dedup + validate</tspan>
  </text>
  <text x="619" y="399" class="desc">
    <tspan x="619" dy="0">Remove duplicates Â· validate step</tspan>
    <tspan x="619" dy="15">types</tspan>
  </text>
  <rect x="914" y="348" width="243" height="85" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="930" y="377" class="icon">&#xf1c0;</text>
  <text x="952" y="379" class="label">
    <tspan x="952" dy="0">Emit flows.json</tspan>
  </text>
  <text x="930" y="399" class="desc">
    <tspan x="930" dy="0">All imported flows enabled:</tspan>
    <tspan x="930" dy="15">false</tspan>
  </text>

  <rect x="1159" y="180" width="-729" height="250" class="panel" fill="#F3E5F5" stroke="#7B1FA2" fill-opacity="0.35"/>
  <text x="1173" y="204" class="layer-label">&#xf466; Nexus output files</text>
  <rect x="1159" y="180" width="300" height="85" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="1175" y="209" class="icon">&#xf15b;</text>
  <text x="1197" y="211" class="label">
    <tspan x="1197" dy="0">flows/flows.json</tspan>
  </text>
  <text x="1175" y="231" class="desc">
    <tspan x="1175" dy="0">Automation definitions with enabled:</tspan>
    <tspan x="1175" dy="15">false</tspan>
  </text>
