  </text>
  <text x="1175" y="372" class="desc">
    <tspan x="1175" dy="0">flows.enabled = true at user's</tspan>
    <tspan x="1175" dy="15">choice</tspan>
  </text>
  <rect x="674" y="496" width="240" height="72" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="690" y="525" class="icon">&#xf013;</text>
  <text x="712" y="527" class="label">
    <tspan x="712" dy="0">FlowRunner</tspan>
  </text>
  <text x="690" y="547" class="desc">
    <tspan x="690" dy="0">Registers triggers at startup</tspan>
  </text>

  <line x1="264" y1="216" x2="320" y2="222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M563,222 L603,222 L603,256 L603,256" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <text x="595" y="239" text-anchor="middle" class="small">parse</text>
  <line x1="955" y1="256" x2="985" y2="262" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1116,305 L743,293 L743,336 L743,348" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M779,292 L1035,304 L1035,360 L1035,348" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="884" y1="390" x2="914" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1157" y1="390" x2="1159" y2="222" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1309" y1="265" x2="1293" y2="321" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1293,406 L794,406 L794,496 L794,496" fill="none" stroke="#64748b"  stroke-width="2" marker-end="url(#arrow-dashed)" stroke-dasharray="6,4"/>

  <rect x="40" y="588" width="366" height="36" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="8"/>
  <text x="223" y="612" text-anchor="middle" class="small">All imported flows default to enabled: false â€” review before enable</text>

  <rect x="40" y="624" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="646" class="legend-title">Pipeline stages</text>
  <rect x="56" y="648" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="660" class="small">Input â€” Langflow export JSON</text>
  <rect x="316" y="648" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="338" y="660" class="small">Transform â€” LangflowTransformationEngine</text>
  <rect x="56" y="670" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="682" class="small">Output â€” flows.json + nxs_config.json</text>
  <rect x="316" y="670" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="338" y="682" class="small">Runtime â€” FlowRunner triggers at startup</text>
</svg>