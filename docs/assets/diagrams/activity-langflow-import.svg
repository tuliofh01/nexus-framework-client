<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 1138" width="640" height="1138">
  <title>UML activity — Langflow → Nexus import</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="640" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <text x="320" y="56" text-anchor="middle" class="layer-label">UML activity — Langflow → Nexus import</text>
  <circle cx="300" cy="100" r="14" fill="#1e293b"/>
  <rect x="140" y="150" width="320" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="156" y="179" class="icon">&#xf544;</text>
  <text x="178" y="181" class="label">
    <tspan x="178" dy="0">Export Langflow JSON</tspan>
  </text>
  <text x="156" y="201" class="desc">
    <tspan x="156" dy="0">API or Export flow from Langflow UI</tspan>
  </text>
  <rect x="140" y="258" width="320" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="156" y="287" class="icon">&#xf013;</text>
  <text x="178" y="289" class="label">
    <tspan x="178" dy="0">LangflowTransformationEngine</tspan>
  </text>
  <text x="156" y="309" class="desc">
    <tspan x="156" dy="0">:core import — map DAG to Nexus</tspan>
  </text>
  <rect x="140" y="366" width="320" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="156" y="395" class="icon">&#xf15b;</text>
  <text x="178" y="397" class="label">
    <tspan x="178" dy="0">Produce blueprint.json (+ flows)</tspan>
  </text>
  <text x="156" y="417" class="desc">
    <tspan x="156" dy="0">Structure + optional automations</tspan>
  </text>
  <rect x="140" y="474" width="320" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="156" y="503" class="icon">&#xf135;</text>
  <text x="178" y="505" class="label">
    <tspan x="178" dy="0">ProjectGenerator.generate</tspan>
  </text>
  <text x="156" y="525" class="desc">
    <tspan x="156" dy="0">Emit builds/framework/&lt;name&gt;/</tspan>
  </text>
  <rect x="140" y="582" width="320" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="156" y="611" class="icon">&#xf121;</text>
  <text x="178" y="613" class="label">
    <tspan x="178" dy="0">User edits C++ / Lua / Python</tspan>
  </text>
  <text x="156" y="633" class="desc">
    <tspan x="156" dy="0">Customize generated sources</tspan>
  </text>
  <rect x="140" y="690" width="320" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="156" y="719" class="icon">&#xf120;</text>
  <text x="178" y="721" class="label">
    <tspan x="178" dy="0">./build_app.sh</tspan>
  </text>
  <text x="156" y="741" class="desc">
    <tspan x="156" dy="0">Native compile of derived app</tspan>
  </text>
  <rect x="140" y="798" width="320" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="156" y="827" class="icon">&#xf466;</text>
  <text x="178" y="829" class="label">
    <tspan x="178" dy="0">Ship native binary</tspan>
  </text>
  <text x="156" y="849" class="desc">
    <tspan x="156" dy="0">Distribute desktop or Android build</tspan>
  </text>
  <circle cx="300" cy="988" r="14" fill="none" stroke="#1e293b" stroke-width="3"/>
  <circle cx="300" cy="988" r="8" fill="#1e293b"/>
  <rect x="140" y="882" width="320" height="56" class="panel" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="300" y="906" text-anchor="middle" class="small">Retain NOTICE attribution</text>
  <text x="300" y="924" text-anchor="middle" class="desc">Nexus License (Nexus-1.0)</text>
  <line x1="300" y1="114" x2="300" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="222" x2="300" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="330" x2="300" y2="366" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="438" x2="300" y2="474" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="546" x2="300" y2="582" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="654" x2="300" y2="690" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="762" x2="300" y2="798" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="870" x2="300" y2="882" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="938" x2="300" y2="974" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="48" y="1038" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="64" y="1060" class="legend-title">Langflow import path</text>
  <rect x="64" y="1062" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="86" y="1074" class="small">External — Langflow export</text>
  <rect x="324" y="1062" width="16" height="16" class="legend-box" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="346" y="1074" class="small">Transform — :core engine</text>
  <rect x="64" y="1084" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="86" y="1096" class="small">Generate — ProjectGenerator</text>
</svg>