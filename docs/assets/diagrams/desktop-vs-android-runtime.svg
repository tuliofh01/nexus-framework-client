<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1455 1015" width="1455" height="1015">
  <title>Desktop vs Android runtime</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1455" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>

  <rect x="400" y="88" width="636" height="405" class="panel" fill="#F3E5F5" stroke="#6A1B9A" fill-opacity="0.35"/>
  <text x="414" y="112" class="layer-label">&#xf5fd; Shared (both templates)</text>
  <rect x="420" y="128" width="268" height="85" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="436" y="157" class="icon">&#xf15b;</text>
  <text x="458" y="159" class="label">
    <tspan x="458" dy="0">blueprint.json</tspan>
  </text>
  <text x="436" y="179" class="desc">
    <tspan x="436" dy="0">Loads blueprint.json at generate</tspan>
    <tspan x="436" dy="15">time</tspan>
  </text>
  <rect x="744" y="128" width="268" height="85" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="760" y="157" class="icon">&#xf120;</text>
  <text x="782" y="159" class="label">
    <tspan x="782" dy="0">Lua 5.4 + sol2</tspan>
  </text>
  <text x="760" y="179" class="desc">
    <tspan x="760" dy="0">Scripting layer shared across</tspan>
    <tspan x="760" dy="15">targets</tspan>
  </text>
  <rect x="420" y="269" width="480" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="436" y="298" class="icon">&#xf121;</text>
  <text x="458" y="300" class="label">
    <tspan x="458" dy="0">C++20 MVC</tspan>
  </text>
  <text x="436" y="320" class="desc">
    <tspan x="436" dy="0">model · controller · view from graph</tspan>
  </text>
  <rect x="420" y="397" width="224" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="436" y="426" class="icon">&#xf080;</text>
  <text x="458" y="428" class="label">
    <tspan x="458" dy="0">ImGui + ImPlot</tspan>
  </text>
  <text x="436" y="448" class="desc">
    <tspan x="436" dy="0">Immediate-mode UI and plotting</tspan>
  </text>
  <rect x="700" y="397" width="243" height="85" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="716" y="426" class="icon">&#xf108;</text>
  <text x="738" y="428" class="label">
    <tspan x="738" dy="0">SDL3 render loop</tspan>
  </text>
  <text x="716" y="448" class="desc">
    <tspan x="716" dy="0">Cross-platform graphics and</tspan>
    <tspan x="716" dy="15">input</tspan>
  </text>

  <rect x="32" y="549" width="660" height="290" class="panel" fill="#E3F2FD" stroke="#1565C0" fill-opacity="0.35"/>
  <text x="46" y="573" class="layer-label">&#xf108; Desktop runtime</text>
  <rect x="52" y="589" width="300" height="85" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="68" y="618" class="icon">&#xf013;</text>
  <text x="90" y="620" class="label">
    <tspan x="90" dy="0">Zig build (primary)</tspan>
  </text>
  <text x="68" y="640" class="desc">
    <tspan x="68" dy="0">Single zig c++ binary compiles all C++</tspan>
    <tspan x="68" dy="15">TUs</tspan>
  </text>
  <rect x="408" y="589" width="260" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="424" y="618" class="icon">&#xe73c;</text>
  <text x="446" y="620" class="label">
    <tspan x="446" dy="0">pybind11 embed</tspan>
  </text>
  <text x="424" y="640" class="desc">
    <tspan x="424" dy="0">Embeds CPython via pybind11</tspan>
  </text>
  <rect x="52" y="730" width="243" height="85" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="68" y="759" class="icon">&#xf15b;</text>
  <text x="90" y="761" class="label">
    <tspan x="90" dy="0">python/functions.py</tspan>
  </text>
  <text x="68" y="781" class="desc">
    <tspan x="68" dy="0">In-process NumPy analytics</tspan>
    <tspan x="68" dy="15">module</tspan>
  </text>
  <rect x="351" y="730" width="260" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="367" y="759" class="icon">&#xf466;</text>
  <text x="389" y="761" class="label">
    <tspan x="389" dy="0">Native binary</tspan>
  </text>
  <text x="367" y="781" class="desc">
    <tspan x="367" dy="0">Win · macOS · Linux executable</tspan>
  </text>

  <rect x="748" y="549" width="667" height="290" class="panel" fill="#FCE4EC" stroke="#C2185B" fill-opacity="0.35"/>
  <text x="762" y="573" class="layer-label">&#xf3cd; Android runtime</text>
  <rect x="768" y="589" width="240" height="72" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="784" y="618" class="icon">&#xf17b;</text>
  <text x="806" y="620" class="label">
    <tspan x="806" dy="0">Gradle + NDK</tspan>
  </text>
  <text x="784" y="640" class="desc">
    <tspan x="784" dy="0">APK build with native C++ libs</tspan>
  </text>
  <rect x="1064" y="589" width="260" height="72" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="1080" y="618" class="icon">&#xf108;</text>
  <text x="1102" y="620" class="label">
    <tspan x="1102" dy="0">SDL3 GLES</tspan>
  </text>
  <text x="1080" y="640" class="desc">
    <tspan x="1080" dy="0">Full-screen touch UI on GLES</tspan>
  </text>
  <rect x="768" y="717" width="307" height="85" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="784" y="746" class="icon">&#xf1e6;</text>
  <text x="806" y="748" class="label">
    <tspan x="806" dy="0">Zig JNI bridge</tspan>
  </text>
  <text x="784" y="768" class="desc">
    <tspan x="784" dy="0">Hand-authored .zig modules (Djinni</tspan>
    <tspan x="784" dy="15">retired)</tspan>
  </text>
  <rect x="1131" y="717" width="260" height="72" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="1147" y="746" class="icon">&#xe73c;</text>
  <text x="1169" y="748" class="label">
    <tspan x="1169" dy="0">Chaquopy</tspan>
  </text>
  <text x="1147" y="768" class="desc">
    <tspan x="1147" dy="0">app/src/main/python/ embedding</tspan>
  </text>

  <line x1="554" y1="213" x2="660" y2="269" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="607" y="235" text-anchor="middle" class="small">wires nodes</text>
  <line x1="744" y1="170" x2="900" y2="305" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="660" y1="341" x2="532" y2="397" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M660,341 L821,341 L821,397 L821,397" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M532,469 L202,469 L202,589 L202,589" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <text x="194" y="529" text-anchor="middle" class="small">desktop</text>
  <path d="M821,482 L888,482 L888,589 L888,589" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <text x="880" y="535" text-anchor="middle" class="small">Android NDK</text>
  <line x1="202" y1="674" x2="173" y2="730" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="538" y1="661" x2="481" y2="730" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="888" y1="661" x2="921" y2="717" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1194" y1="661" x2="1261" y2="717" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="52" y="827" width="559" height="24" fill="#FFFFFF" stroke="#64748b" stroke-dasharray="4,3" rx="6"/>
  <text x="331" y="844" text-anchor="middle" class="desc">CMake fallback: legacy-cmake-debug / release presets</text>

  <rect x="1092" y="118" width="300" height="70" class="panel" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="1112" y="148" class="small">Same plotter template on both targets.</text>
  <text x="1112" y="168" class="desc">blueprint.json declares the same node graph.</text>

  <rect x="543" y="839" width="360" height="50" class="panel" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="563" y="869" class="small">Lowest latency: Python runs in-process via pybind11.</text>

  <rect x="32" y="895" width="500" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="48" y="917" class="legend-title">Runtime layers</text>
  <rect x="48" y="919" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="70" y="931" class="small">Shared — blueprint + MVC + SDL3</text>
  <rect x="298" y="919" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="320" y="931" class="small">Desktop — Zig build (primary) + pybind11</text>
  <rect x="48" y="941" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="70" y="953" class="small">Android — Gradle + Zig JNI + Chaquopy</text>
</svg>