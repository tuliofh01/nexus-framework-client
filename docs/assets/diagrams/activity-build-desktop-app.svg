<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1272" width="720" height="1272">
  <title>UML activity — build generated desktop app</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="720" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <text x="360" y="56" text-anchor="middle" class="layer-label">UML activity — build generated desktop app</text>
  <circle cx="280" cy="100" r="14" fill="#1e293b"/>
  <rect x="120" y="150" width="320" height="72" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="136" y="179" class="icon">&#xf466;</text>
  <text x="158" y="181" class="label">
    <tspan x="158" dy="0">cd builds/framework/&lt;App&gt;</tspan>
  </text>
  <text x="136" y="201" class="desc">
    <tspan x="136" dy="0">Enter generated project tree</tspan>
  </text>
  <rect x="120" y="258" width="320" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="136" y="287" class="icon">&#xf120;</text>
  <text x="158" y="289" class="label">
    <tspan x="158" dy="0">./build_app.sh</tspan>
  </text>
  <text x="136" y="309" class="desc">
    <tspan x="136" dy="0">Host orchestrator for native build</tspan>
  </text>
  <rect x="120" y="366" width="320" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="136" y="395" class="icon">&#xe73c;</text>
  <text x="158" y="397" class="label">
    <tspan x="158" dy="0">Create / refresh Python venv</tspan>
  </text>
  <text x="136" y="417" class="desc">
    <tspan x="136" dy="0">Host tooling for pack/archive steps</tspan>
  </text>
  <rect x="120" y="474" width="320" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="136" y="503" class="icon">&#xf487;</text>
  <text x="158" y="505" class="label">
    <tspan x="158" dy="0">Fetch / check native deps</tspan>
  </text>
  <text x="136" y="525" class="desc">
    <tspan x="136" dy="0">SDL3, Lua, ImGui, …</tspan>
  </text>
  <rect x="120" y="582" width="320" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="136" y="611" class="icon">&#xf121;</text>
  <text x="158" y="613" class="label">
    <tspan x="158" dy="0">g++ -fmodules-ts compile</tspan>
  </text>
  <text x="136" y="633" class="desc">
    <tspan x="136" dy="0">Compile .cppm translation units</tspan>
  </text>
  <rect x="120" y="690" width="320" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="136" y="719" class="icon">&#xf013;</text>
  <text x="158" y="721" class="label">
    <tspan x="158" dy="0">zig build nexus_zig sidecar</tspan>
  </text>
  <text x="136" y="741" class="desc">
    <tspan x="136" dy="0">zig-services compile + link helpers</tspan>
  </text>
  <rect x="120" y="798" width="320" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="136" y="827" class="icon">&#xf108;</text>
  <text x="158" y="829" class="label">
    <tspan x="158" dy="0">Link desktop binary</tspan>
  </text>
  <text x="136" y="849" class="desc">
    <tspan x="136" dy="0">Produce runnable SDL3 executable</tspan>
  </text>
  <polygon points="280,876 324,920 280,964 236,920" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="924" text-anchor="middle" class="small">Success?</text>
  <rect x="260" y="1000" width="320" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="276" y="1029" class="icon">&#xf135;</text>
  <text x="298" y="1031" class="label">
    <tspan x="298" dy="0">Run / package binary</tspan>
  </text>
  <text x="276" y="1051" class="desc">
    <tspan x="276" dy="0">Launch or ship the desktop app</tspan>
  </text>
  <rect x="-90" y="1000" width="320" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="-74" y="1029" class="icon">&#xf002;</text>
  <text x="-52" y="1031" class="label">
    <tspan x="-52" dy="0">Inspect build log</tspan>
  </text>
  <text x="-74" y="1051" class="desc">
    <tspan x="-74" dy="0">Fix modules / Zig / deps and retry</tspan>
  </text>
  <circle cx="280" cy="1122" r="14" fill="none" stroke="#1e293b" stroke-width="3"/>
  <circle cx="280" cy="1122" r="8" fill="#1e293b"/>
  <line x1="280" y1="114" x2="280" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="222" x2="280" y2="258" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="330" x2="280" y2="366" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="438" x2="280" y2="474" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="546" x2="280" y2="582" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="654" x2="280" y2="690" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="762" x2="280" y2="798" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="280" y1="870" x2="280" y2="876" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M324,920 L420,920 L420,1000 L420,1000" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="960" text-anchor="middle" class="small">yes</text>
  <path d="M236,920 L70,920 L70,1000 L70,1000" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <text x="62" y="960" text-anchor="middle" class="small">no</text>
  <path d="M420,1072 L280,1072 L280,1108 L280,1108" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M70,1072 L280,1072 L280,1108 L280,1108" fill="none" stroke="#64748b"  stroke-width="2" marker-end="url(#arrow-dashed)" stroke-dasharray="6,4"/>
  <rect x="48" y="1172" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="64" y="1194" class="legend-title">Desktop build</text>
  <rect x="64" y="1196" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="86" y="1208" class="small">Build — script + Zig sidecar</text>
  <rect x="324" y="1196" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="346" y="1208" class="small">Compile — C++ modules</text>
  <rect x="64" y="1218" width="16" height="16" class="legend-box" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="86" y="1230" class="small">Decision — link success</text>
</svg>