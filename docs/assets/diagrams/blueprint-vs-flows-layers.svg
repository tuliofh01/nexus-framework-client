<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560">
  <title>blueprint.json vs flows.json layers</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1200" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <rect x="40" y="88" width="520" height="380" class="panel" fill="#FFF8E1" stroke="#F57F17" fill-opacity="0.35"/>
  <text x="54" y="112" class="layer-label">&#xf15b; Design-time — blueprint.json</text>
  <text x="300" y="130" text-anchor="middle" class="desc">Langflow-style MVC wiring · consumed at generation</text>
  <rect x="80" y="160" width="220" height="72" class="node" fill="#FFFFFF" stroke="#F57F17"/>
  <text x="94" y="186" class="icon">&#xe73c;</text>
  <text x="116" y="188" class="label">
    <tspan x="116" dy="0">python.module</tspan>
  </text>
  <text x="94" y="207" class="desc">
    <tspan x="94" dy="0">Analytics and glue modules</tspan>
  </text>
  <rect x="320" y="160" width="220" height="72" class="node" fill="#FFFFFF" stroke="#F57F17"/>
  <text x="334" y="186" class="icon">&#xf1c0;</text>
  <text x="356" y="188" class="label">
    <tspan x="356" dy="0">cpp.model</tspan>
  </text>
  <text x="334" y="207" class="desc">
    <tspan x="334" dy="0">Domain state and caches</tspan>
  </text>
  <rect x="80" y="252" width="220" height="72" class="node" fill="#FFFFFF" stroke="#F57F17"/>
  <text x="94" y="278" class="icon">&#xf013;</text>
  <text x="116" y="280" class="label">
    <tspan x="116" dy="0">cpp.controller</tspan>
  </text>
  <text x="94" y="299" class="desc">
    <tspan x="94" dy="0">Command routing layer</tspan>
  </text>
  <rect x="320" y="252" width="220" height="72" class="node" fill="#FFFFFF" stroke="#F57F17"/>
  <text x="334" y="278" class="icon">&#xf5fd;</text>
  <text x="356" y="280" class="label">
    <tspan x="356" dy="0">ui.page</tspan>
  </text>
  <text x="334" y="299" class="desc">
    <tspan x="334" dy="0">ImGui screens and DSL layout</tspan>
  </text>
  <rect x="180" y="344" width="280" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="194" y="370" class="icon">&#xf135;</text>
  <text x="216" y="372" class="label">
    <tspan x="216" dy="0">:core ProjectGenerator</tspan>
  </text>
  <text x="194" y="391" class="desc">
    <tspan x="194" dy="0">Validates graph · emits src/ tree</tspan>
  </text>
  <line x1="180" y1="218" x2="300" y2="218" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="280" y1="298" x2="280" y2="320" stroke="#1565C0" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="640" y="88" width="520" height="380" class="panel" fill="#E8F5E9" stroke="#2E7D32" fill-opacity="0.35"/>
  <text x="654" y="112" class="layer-label">&#xf126; Runtime — flows/flows.json</text>
  <text x="900" y="130" text-anchor="middle" class="desc">Optional in-app services · loaded at app startup</text>
  <rect x="680" y="160" width="232" height="78" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="694" y="186" class="icon">&#xf013;</text>
  <text x="716" y="188" class="label">
    <tspan x="716" dy="0">background flows</tspan>
  </text>
  <text x="694" y="207" class="desc">
    <tspan x="694" dy="0">interval loops while app is</tspan>
    <tspan x="694" dy="14">alive</tspan>
  </text>
  <rect x="920" y="160" width="240" height="72" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="934" y="186" class="icon">&#xf075;</text>
  <text x="956" y="188" class="label">
    <tspan x="956" dy="0">triggered flows</tspan>
  </text>
  <text x="934" y="207" class="desc">
    <tspan x="934" dy="0">event · startup · manual · hotkey</tspan>
  </text>
  <rect x="680" y="252" width="480" height="72" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="694" y="278" class="icon">&#xf120;</text>
  <text x="716" y="280" class="label">
    <tspan x="716" dy="0">steps[] invoke</tspan>
  </text>
  <text x="694" y="299" class="desc">
    <tspan x="694" dy="0">nxs.* · python.* · lua.* targets</tspan>
  </text>
  <rect x="780" y="344" width="280" height="72" class="node" fill="#FFFFFF" stroke="#00838F"/>
  <text x="794" y="370" class="icon">&#xf013;</text>
  <text x="816" y="372" class="label">
    <tspan x="816" dy="0">FlowRunner</tspan>
  </text>
  <text x="794" y="391" class="desc">
    <tspan x="794" dy="0">Registers triggers from flows.json</tspan>
  </text>
  <line x1="780" y1="218" x2="900" y2="218" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="900" y1="298" x2="900" y2="320" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="200" y="490" width="800" height="44" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="600" y="518" text-anchor="middle" class="small">Same Langflow canvas may split: structure → blueprint.json · automation → flows.json</text>

  <rect x="40" y="440" width="1120" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="462" class="legend-title">Two-layer model</text>
  <rect x="56" y="464" width="16" height="16" class="legend-box" fill="#FFF8E1" stroke="#F57F17"/>
  <text x="78" y="476" class="small">blueprint.json — design-time codegen</text>
  <rect x="616" y="464" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="638" y="476" class="small">flows.json — runtime automation</text>
  <rect x="56" y="486" width="16" height="16" class="legend-box" fill="#6A1B9A" stroke="#6A1B9A"/>
  <text x="78" y="498" class="small">ProjectGenerator — one-time emit</text>
  <rect x="616" y="486" width="16" height="16" class="legend-box" fill="#00838F" stroke="#00838F"/>
  <text x="638" y="498" class="small">FlowRunner — in-process triggers</text>
</svg>