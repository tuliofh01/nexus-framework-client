  <line x1="328" y1="317" x2="396" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="212" x2="527" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="527" y1="353" x2="533" y2="409" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="533" y1="494" x2="527" y2="550" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="527" y1="635" x2="526" y2="691" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M656,727 L656,176 L740,176 L740,176" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="870" y1="212" x2="874" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="874" y1="353" x2="880" y2="409" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="880" y1="494" x2="870" y2="550" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="870" y1="622" x2="870" y2="678" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1000" y1="714" x2="1077" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1337" y1="176" x2="1393" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1653,176 L1653,100 L1709,100 L1709,176" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1653,176 L1665,120 L2037,120 L2025,176" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1839" y1="212" x2="1839" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1839" y1="340" x2="1839" y2="396" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="2155" y1="212" x2="2155" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="2155" y1="340" x2="2155" y2="396" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M2285,432 L2285,182 L2341,182 L2341,182" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="680" y="819" width="380" height="70" class="panel" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="700" y="847" class="small">Headless: ./gradlew :cli:run --args="generate …"</text>
  <text x="700" y="867" class="desc">Optional Docker path via misc/docker/</text>
  <rect x="24" y="909" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="40" y="931" class="legend-title">Pipeline stages</text>
  <rect x="40" y="933" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="62" y="945" class="small">Setup — JDK 26 + Git bootstrap</text>
  <rect x="300" y="933" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="322" y="945" class="small">Client — Compose Generate UI</text>
  <rect x="40" y="955" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="62" y="967" class="small">Core — template engine + emit</text>
  <rect x="300" y="955" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="322" y="967" class="small">Android — Gradle + Chaquopy path</text>
</svg>