<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 980" width="2200" height="980">
  <title>Generation &amp; builds flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="2200" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <text x="190" y="110" text-anchor="middle" class="layer-label">First run</text>
  <text x="450" y="110" text-anchor="middle" class="layer-label">Scaffold client</text>
  <text x="730" y="110" text-anchor="middle" class="layer-label">:core / :cli</text>
  <text x="990" y="110" text-anchor="middle" class="layer-label">Output</text>
  <text x="1300" y="110" text-anchor="middle" class="layer-label">Native build</text>
  <text x="1750" y="110" text-anchor="middle" class="layer-label">Optional</text>
  <line x1="280" y1="120" x2="280" y2="680" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="560" y1="120" x2="560" y2="680" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="840" y1="120" x2="840" y2="680" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1120" y1="120" x2="1120" y2="680" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1360" y1="120" x2="1360" y2="680" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1780" y1="120" x2="1780" y2="680" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="80" y="140" width="288" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="94" y="166" class="icon">&#xf0ad;</text>
  <text x="116" y="168" class="label">
    <tspan x="116" dy="0">Run misc/client-setup/</tspan>
  </text>
  <text x="94" y="187" class="desc">
    <tspan x="94" dy="0">Installs JDK 26 and Git before first</tspan>
    <tspan x="94" dy="14">build</tspan>
  </text>
  <rect x="80" y="250" width="276" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="94" y="276" class="icon">&#xf120;</text>
  <text x="116" y="278" class="label">
    <tspan x="116" dy="0">source env.sh</tspan>
  </text>
  <text x="94" y="297" class="desc">
    <tspan x="94" dy="0">Activates toolchain for Gradle and CMake</tspan>
  </text>
  <rect x="340" y="140" width="276" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="354" y="166" class="icon">&#xf108;</text>
  <text x="376" y="168" class="label">
    <tspan x="376" dy="0">./gradlew :app:run</tspan>
  </text>
  <text x="354" y="187" class="desc">
    <tspan x="354" dy="0">Launches Compose Desktop scaffold client</tspan>
  </text>
  <rect x="340" y="250" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="354" y="276" class="icon">&#xf5fd;</text>
  <text x="376" y="278" class="label">
    <tspan x="376" dy="0">Generate Project screen</tspan>
  </text>
  <text x="354" y="297" class="desc">
    <tspan x="354" dy="0">Collects name, type, and output path</tspan>
  </text>
  <rect x="340" y="370" width="263" height="78" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="354" y="396" class="icon">&#xf126;</text>
  <text x="376" y="398" class="label">
    <tspan x="376" dy="0">Blueprint Editor?</tspan>
  </text>
  <text x="354" y="417" class="desc">
    <tspan x="354" dy="0">Optional visual edit of</tspan>
    <tspan x="354" dy="14">blueprint.json</tspan>
  </text>
  <rect x="340" y="490" width="260" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="354" y="516" class="icon">&#xf013;</text>
  <text x="376" y="518" class="label">
    <tspan x="376" dy="0">BlueprintValidator</tspan>
  </text>
  <text x="354" y="537" class="desc">
    <tspan x="354" dy="0">Schema check before codegen proceeds</tspan>
  </text>
  <rect x="340" y="610" width="260" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="354" y="636" class="icon">&#xf135;</text>
  <text x="376" y="638" class="label">
    <tspan x="376" dy="0">ProjectGenerator</tspan>
  </text>
  <text x="354" y="657" class="desc">
    <tspan x="354" dy="0">Orchestrates template copy and emit</tspan>
  </text>
  <rect x="620" y="140" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="634" y="166" class="icon">&#xf487;</text>
  <text x="656" y="168" class="label">
    <tspan x="656" dy="0">Read template/</tspan>
  </text>
  <text x="634" y="187" class="desc">
    <tspan x="634" dy="0">desktop-app or android-app skeleton</tspan>
  </text>
  <rect x="620" y="250" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="634" y="276" class="icon">&#xf121;</text>
  <text x="656" y="278" class="label">
    <tspan x="656" dy="0">TemplateEngine</tspan>
  </text>
  <text x="634" y="297" class="desc">
    <tspan x="634" dy="0">Substitutes {{placeholders}} in files</tspan>
  </text>
  <rect x="620" y="360" width="269" height="78" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="634" y="386" class="icon">&#xf15b;</text>
  <text x="656" y="388" class="label">
    <tspan x="656" dy="0">Validate blueprint.json</tspan>
  </text>
  <text x="634" y="407" class="desc">
    <tspan x="634" dy="0">Ensures graph nodes and edges are</tspan>
    <tspan x="634" dy="14">valid</tspan>
  </text>
  <rect x="620" y="470" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="634" y="496" class="icon">&#xf466;</text>
  <text x="656" y="498" class="label">
    <tspan x="656" dy="0">Copy template/shared/</tspan>
  </text>
  <text x="634" y="517" class="desc">
    <tspan x="634" dy="0">DSL, themes, and runtime helpers</tspan>
  </text>
  <rect x="620" y="580" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="634" y="606" class="icon">&#xf15b;</text>
  <text x="656" y="608" class="label">
    <tspan x="656" dy="0">Write nxs_config.json</tspan>
  </text>
  <text x="634" y="627" class="desc">
    <tspan x="634" dy="0">Schema v2 project metadata on disk</tspan>
  </text>
  <rect x="900" y="360" width="260" height="72" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="914" y="386" class="icon">&#xf466;</text>
  <text x="936" y="388" class="label">
    <tspan x="936" dy="0">Emit builds/framework/</tspan>
  </text>
  <text x="914" y="407" class="desc">
    <tspan x="914" dy="0">Out-of-source native project tree</tspan>
  </text>
  <rect x="1180" y="250" width="260" height="72" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1194" y="276" class="icon">&#xf126;</text>
  <text x="1216" y="278" class="label">
    <tspan x="1216" dy="0">Desktop?</tspan>
  </text>
  <text x="1194" y="297" class="desc">
    <tspan x="1194" dy="0">Branch on project type selection</tspan>
  </text>
  <rect x="1400" y="140" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1414" y="166" class="icon">&#xf108;</text>
  <text x="1436" y="168" class="label">
    <tspan x="1436" dy="0">cmake --preset debug</tspan>
  </text>
  <text x="1414" y="187" class="desc">
    <tspan x="1414" dy="0">Configure CMake + Ninja build files</tspan>
  </text>
  <rect x="1400" y="250" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1414" y="276" class="icon">&#xf013;</text>
  <text x="1436" y="278" class="label">
    <tspan x="1436" dy="0">cmake --build</tspan>
  </text>
  <text x="1414" y="297" class="desc">
    <tspan x="1414" dy="0">Compile C++ sources and link binary</tspan>
  </text>
  <rect x="1400" y="360" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1414" y="386" class="icon">&#xf135;</text>
  <text x="1436" y="388" class="label">
    <tspan x="1436" dy="0">Run native binary</tspan>
  </text>
  <text x="1414" y="407" class="desc">
    <tspan x="1414" dy="0">SDL3 desktop app with pybind11</tspan>
  </text>
  <rect x="1620" y="140" width="260" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1634" y="166" class="icon">&#xf17b;</text>
  <text x="1656" y="168" class="label">
    <tspan x="1656" dy="0">assembleDebug</tspan>
  </text>
  <text x="1634" y="187" class="desc">
    <tspan x="1634" dy="0">Gradle builds Android APK via NDK</tspan>
  </text>
  <rect x="1620" y="250" width="260" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1634" y="276" class="icon">&#xf1e6;</text>
  <text x="1656" y="278" class="label">
    <tspan x="1656" dy="0">Djinni + Chaquopy</tspan>
  </text>
  <text x="1634" y="297" class="desc">
    <tspan x="1634" dy="0">JNI bridge and embedded Python</tspan>
  </text>
  <rect x="1620" y="360" width="260" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1634" y="386" class="icon">&#xf3cd;</text>
  <text x="1656" y="388" class="label">
    <tspan x="1656" dy="0">Install APK</tspan>
  </text>
  <text x="1634" y="407" class="desc">
    <tspan x="1634" dy="0">Deploy to device or emulator</tspan>
  </text>
  <rect x="1860" y="250" width="260" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1874" y="276" class="icon">&#xf0c2;</text>
  <text x="1896" y="278" class="label">
    <tspan x="1896" dy="0">deployToBuildsClient</tspan>
  </text>
  <text x="1874" y="297" class="desc">
    <tspan x="1874" dy="0">Copy client distro to builds/client/</tspan>
  </text>


