<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2100 900" width="2100" height="900">
  <title>Generation & builds flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .title { font: 19px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1a1a2e; font-weight: 700; }
      .subtitle { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #666666; font-weight: normal; }
      .label { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="2100" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <text x="1050" y="38" text-anchor="middle" class="title">Generation & builds flow</text>
  <text x="1050" y="58" text-anchor="middle" class="subtitle">From client-setup to builds/framework output</text>

  <text x="190" y="110" text-anchor="middle" class="layer-label">First run</text>
  <text x="450" y="110" text-anchor="middle" class="layer-label">Scaffold client</text>
  <text x="730" y="110" text-anchor="middle" class="layer-label">:core / :cli</text>
  <text x="990" y="110" text-anchor="middle" class="layer-label">Output</text>
  <text x="1300" y="110" text-anchor="middle" class="layer-label">Native build</text>
  <text x="1750" y="110" text-anchor="middle" class="layer-label">Optional</text>
  <line x1="280" y1="120" x2="280" y2="620" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="560" y1="120" x2="560" y2="620" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="840" y1="120" x2="840" y2="620" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1120" y1="120" x2="1120" y2="620" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1360" y1="120" x2="1360" y2="620" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="1780" y1="120" x2="1780" y2="620" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>

  <rect x="80" y="140" width="220" height="62" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="92" y="162" class="icon">&#xf0ad;</text>
  <text x="114" y="162" class="label">Run misc/client-setup/</text>
  <text x="92" y="192" class="desc">Installs JDK 26 and Git before first build</text>
  <rect x="80" y="230" width="220" height="62" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="92" y="252" class="icon">&#xf120;</text>
  <text x="114" y="252" class="label">source env.sh</text>
  <text x="92" y="282" class="desc">Activates toolchain for Gradle and CMake</text>
  <rect x="340" y="140" width="220" height="62" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="352" y="162" class="icon">&#xf108;</text>
  <text x="374" y="162" class="label">./gradlew :app:run</text>
  <text x="352" y="192" class="desc">Launches Compose Desktop scaffold client</text>
  <rect x="340" y="230" width="220" height="62" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="352" y="252" class="icon">&#xf5fd;</text>
  <text x="374" y="252" class="label">Generate Project screen</text>
  <text x="352" y="282" class="desc">Collects name, type, and output path</text>
  <rect x="340" y="340" width="220" height="62" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="352" y="362" class="icon">&#xf126;</text>
  <text x="374" y="362" class="label">Blueprint Editor?</text>
  <text x="352" y="392" class="desc">Optional visual edit of blueprint.json</text>
  <rect x="340" y="450" width="220" height="62" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="352" y="472" class="icon">&#xf013;</text>
  <text x="374" y="472" class="label">BlueprintValidator</text>
  <text x="352" y="502" class="desc">Schema check before codegen proceeds</text>
  <rect x="340" y="540" width="220" height="62" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="352" y="562" class="icon">&#xf135;</text>
  <text x="374" y="562" class="label">ProjectGenerator</text>
  <text x="352" y="592" class="desc">Orchestrates template copy and emit</text>
  <rect x="620" y="140" width="220" height="62" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="632" y="162" class="icon">&#xf487;</text>
  <text x="654" y="162" class="label">Read template/</text>
  <text x="632" y="192" class="desc">desktop-app or android-app skeleton</text>
  <rect x="620" y="230" width="220" height="62" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="632" y="252" class="icon">&#xf121;</text>
  <text x="654" y="252" class="label">TemplateEngine</text>
  <text x="632" y="282" class="desc">Substitutes {{placeholders}} in files</text>
  <rect x="620" y="320" width="220" height="62" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="632" y="342" class="icon">&#xf15b;</text>
  <text x="654" y="342" class="label">Validate blueprint.json</text>
  <text x="632" y="372" class="desc">Ensures graph nodes and edges are valid</text>
  <rect x="620" y="410" width="220" height="62" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="632" y="432" class="icon">&#xf466;</text>
  <text x="654" y="432" class="label">Copy template/shared/</text>
  <text x="632" y="462" class="desc">DSL, themes, and runtime helpers</text>
  <rect x="620" y="500" width="220" height="62" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="632" y="522" class="icon">&#xf15b;</text>
  <text x="654" y="522" class="label">Write nxs_config.json</text>
  <text x="632" y="552" class="desc">Schema v2 project metadata on disk</text>
  <rect x="900" y="320" width="220" height="62" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="912" y="342" class="icon">&#xf466;</text>
  <text x="934" y="342" class="label">Emit builds/framework/</text>
  <text x="912" y="372" class="desc">Out-of-source native project tree</text>
  <rect x="1180" y="230" width="220" height="62" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1192" y="252" class="icon">&#xf126;</text>
  <text x="1214" y="252" class="label">Desktop?</text>
  <text x="1192" y="282" class="desc">Branch on project type selection</text>
  <rect x="1400" y="140" width="220" height="62" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1412" y="162" class="icon">&#xf108;</text>
  <text x="1434" y="162" class="label">cmake --preset debug</text>
  <text x="1412" y="192" class="desc">Configure CMake + Ninja build files</text>
  <rect x="1400" y="230" width="220" height="62" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1412" y="252" class="icon">&#xf013;</text>
  <text x="1434" y="252" class="label">cmake --build</text>
  <text x="1412" y="282" class="desc">Compile C++ sources and link binary</text>
  <rect x="1400" y="320" width="220" height="62" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1412" y="342" class="icon">&#xf135;</text>
  <text x="1434" y="342" class="label">Run native binary</text>
  <text x="1412" y="372" class="desc">SDL3 desktop app with pybind11</text>
  <rect x="1620" y="140" width="220" height="62" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1632" y="162" class="icon">&#xf17b;</text>
  <text x="1654" y="162" class="label">assembleDebug</text>
  <text x="1632" y="192" class="desc">Gradle builds Android APK via NDK</text>
  <rect x="1620" y="230" width="220" height="62" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1632" y="252" class="icon">&#xf1e6;</text>
  <text x="1654" y="252" class="label">Djinni + Chaquopy</text>
  <text x="1632" y="282" class="desc">JNI bridge and embedded Python</text>
  <rect x="1620" y="320" width="220" height="62" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1632" y="342" class="icon">&#xf3cd;</text>
  <text x="1654" y="342" class="label">Install APK</text>
  <text x="1632" y="372" class="desc">Deploy to device or emulator</text>
  <rect x="1860" y="230" width="220" height="62" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1872" y="252" class="icon">&#xf0c2;</text>
  <text x="1894" y="252" class="label">deployToBuildsClient</text>
  <text x="1872" y="282" class="desc">Copy client distro to builds/client/</text>


  <line x1="190" y1="202" x2="190" y2="230" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="171" x2="340" y2="171" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="202" x2="450" y2="230" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="292" x2="450" y2="340" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="402" x2="450" y2="450" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="512" x2="450" y2="540" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="571" x2="620" y2="171" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="202" x2="730" y2="230" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="292" x2="730" y2="320" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="382" x2="730" y2="410" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="730" y1="472" x2="730" y2="500" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="840" y1="351" x2="900" y2="351" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1120" y1="351" x2="1180" y2="261" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1290" y1="261" x2="1400" y2="171" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1290" y1="261" x2="1620" y2="171" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1510" y1="202" x2="1510" y2="230" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1510" y1="292" x2="1510" y2="320" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1730" y1="202" x2="1730" y2="230" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1730" y1="292" x2="1730" y2="320" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1680" y1="351" x2="1860" y2="261" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="600" y="580" width="320" height="70" class="panel" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="620" y="608" class="small">Headless: ./gradlew :cli:run --args="generate …"</text>
  <text x="620" y="628" class="desc">Optional Docker path via misc/docker/</text>

  <rect x="24" y="680" width="500" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="40" y="702" class="legend-title">Pipeline stages</text>
  <rect x="40" y="704" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="62" y="716" class="small">Setup — JDK 26 + Git bootstrap</text>
  <rect x="290" y="704" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="312" y="716" class="small">Client — Compose Generate UI</text>
  <rect x="40" y="726" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="62" y="738" class="small">Core — template engine + emit</text>
  <rect x="290" y="726" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="312" y="738" class="small">Android — Gradle + Chaquopy path</text>
</svg>