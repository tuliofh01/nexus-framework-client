  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <text x="184" y="110" text-anchor="middle" class="layer-label">First run</text>
  <text x="514" y="110" text-anchor="middle" class="layer-label">Scaffold client</text>
  <text x="834" y="110" text-anchor="middle" class="layer-label">:core / :cli</text>
  <text x="1147" y="110" text-anchor="middle" class="layer-label">Output</text>
  <text x="1609" y="110" text-anchor="middle" class="layer-label">Native build</text>
  <text x="2379" y="110" text-anchor="middle" class="layer-label">Optional</text>
