  <line x1="565" y1="494" x2="559" y2="550" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="559" y1="635" x2="558" y2="691" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M688,727 L688,176 L772,176 L772,176" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="902" y1="212" x2="906" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="906" y1="353" x2="912" y2="409" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="912" y1="494" x2="902" y2="550" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="902" y1="622" x2="902" y2="678" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1032" y1="714" x2="1109" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1369" y1="176" x2="1425" y2="176" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1685,176 L1685,100 L1741,100 L1741,176" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1685,176 L1697,120 L2069,120 L2057,176" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1871" y1="212" x2="1871" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="2187" y1="212" x2="2197" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="2197" y1="353" x2="2187" y2="409" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M2317,445 L2317,182 L2394,182 L2394,182" fill="none" stroke="#475569"  stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="680" y="819" width="380" height="70" class="panel" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="700" y="847" class="small">Headless: ./gradlew :cli:run --args="generate …"</text>
  <text x="700" y="867" class="desc">Optional Docker path via misc/docker/</text>
  <rect x="24" y="909" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="40" y="931" class="legend-title">Pipeline stages</text>
  <rect x="40" y="933" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="62" y="945" class="small">Setup — JDK 26 + Git bootstrap</text>
  <rect x="300" y="933" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="322" y="945" class="small">Client — Compose Generate UI</text>
  <rect x="40" y="955" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="62" y="967" class="small">Core — template engine + emit</text>
  <rect x="300" y="955" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="322" y="967" class="small">Android — Gradle + Chaquopy path</text>
</svg>