  <line x1="2080" y1="120" x2="2080" y2="746" stroke="#CFD8DC" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="40" y="140" width="288" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="166" class="icon">&#xf0ad;</text>
  <text x="76" y="168" class="label">
    <tspan x="76" dy="0">Run misc/client-setup/</tspan>
  </text>
  <text x="54" y="187" class="desc">
    <tspan x="54" dy="0">Installs JDK 26 and Git before first</tspan>
    <tspan x="54" dy="14">build</tspan>
  </text>
  <rect x="40" y="266" width="276" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="292" class="icon">&#xf120;</text>
  <text x="76" y="294" class="label">
    <tspan x="76" dy="0">source env.sh</tspan>
  </text>
  <text x="54" y="313" class="desc">
    <tspan x="54" dy="0">Activates toolchain for Gradle and CMake</tspan>
  </text>
  <rect x="376" y="140" width="276" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="390" y="166" class="icon">&#xf108;</text>
  <text x="412" y="168" class="label">
    <tspan x="412" dy="0">./gradlew :app:run</tspan>
  </text>
  <text x="390" y="187" class="desc">
    <tspan x="390" dy="0">Launches Compose Desktop scaffold client</tspan>
  </text>
  <rect x="376" y="260" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="390" y="286" class="icon">&#xf5fd;</text>
  <text x="412" y="288" class="label">
    <tspan x="412" dy="0">Generate Project screen</tspan>
  </text>
  <text x="390" y="307" class="desc">
    <tspan x="390" dy="0">Collects name, type, and output path</tspan>
  </text>
  <rect x="376" y="380" width="263" height="78" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="390" y="406" class="icon">&#xf126;</text>
  <text x="412" y="408" class="label">
    <tspan x="412" dy="0">Blueprint Editor?</tspan>
  </text>
  <text x="390" y="427" class="desc">
    <tspan x="390" dy="0">Optional visual edit of</tspan>
    <tspan x="390" dy="14">blueprint.json</tspan>
  </text>
  <rect x="376" y="506" width="260" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="390" y="532" class="icon">&#xf013;</text>
  <text x="412" y="534" class="label">
    <tspan x="412" dy="0">BlueprintValidator</tspan>
  </text>
  <text x="390" y="553" class="desc">
    <tspan x="390" dy="0">Schema check before codegen proceeds</tspan>
  </text>
  <rect x="376" y="626" width="260" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="390" y="652" class="icon">&#xf135;</text>
  <text x="412" y="654" class="label">
    <tspan x="412" dy="0">ProjectGenerator</tspan>
  </text>
  <text x="390" y="673" class="desc">
    <tspan x="390" dy="0">Orchestrates template copy and emit</tspan>
  </text>
  <rect x="700" y="140" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="714" y="166" class="icon">&#xf487;</text>
  <text x="736" y="168" class="label">
    <tspan x="736" dy="0">Read template/</tspan>
  </text>
  <text x="714" y="187" class="desc">
    <tspan x="714" dy="0">desktop-app or android-app skeleton</tspan>
  </text>
  <rect x="700" y="260" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="714" y="286" class="icon">&#xf121;</text>
  <text x="736" y="288" class="label">
    <tspan x="736" dy="0">TemplateEngine</tspan>
  </text>
  <text x="714" y="307" class="desc">
    <tspan x="714" dy="0">Substitutes {{placeholders}} in files</tspan>
  </text>
  <rect x="700" y="380" width="269" height="78" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="714" y="406" class="icon">&#xf15b;</text>
  <text x="736" y="408" class="label">
    <tspan x="736" dy="0">Validate blueprint.json</tspan>
  </text>
  <text x="714" y="427" class="desc">
    <tspan x="714" dy="0">Ensures graph nodes and edges are</tspan>
    <tspan x="714" dy="14">valid</tspan>
  </text>
  <rect x="700" y="506" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="714" y="532" class="icon">&#xf466;</text>
  <text x="736" y="534" class="label">
    <tspan x="736" dy="0">Copy template/shared/</tspan>
  </text>
  <text x="714" y="553" class="desc">
    <tspan x="714" dy="0">DSL, themes, and runtime helpers</tspan>
  </text>
  <rect x="700" y="626" width="260" height="72" class="node" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="714" y="652" class="icon">&#xf15b;</text>
  <text x="736" y="654" class="label">
    <tspan x="736" dy="0">Write nxs_config.json</tspan>
  </text>
  <text x="714" y="673" class="desc">
    <tspan x="714" dy="0">Schema v2 project metadata on disk</tspan>
  </text>
  <rect x="1017" y="140" width="260" height="72" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1031" y="166" class="icon">&#xf466;</text>
  <text x="1053" y="168" class="label">
    <tspan x="1053" dy="0">Emit builds/framework/</tspan>
  </text>
  <text x="1031" y="187" class="desc">
    <tspan x="1031" dy="0">Out-of-source native project tree</tspan>
  </text>
  <rect x="1325" y="140" width="260" height="72" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1339" y="166" class="icon">&#xf126;</text>
  <text x="1361" y="168" class="label">
    <tspan x="1361" dy="0">Desktop?</tspan>
  </text>
  <text x="1339" y="187" class="desc">
    <tspan x="1339" dy="0">Branch on project type selection</tspan>
  </text>
  <rect x="1633" y="140" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1647" y="166" class="icon">&#xf108;</text>
  <text x="1669" y="168" class="label">
    <tspan x="1669" dy="0">cmake --preset debug</tspan>
  </text>
  <text x="1647" y="187" class="desc">
    <tspan x="1647" dy="0">Configure CMake + Ninja build files</tspan>
  </text>
  <rect x="1633" y="260" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1647" y="286" class="icon">&#xf013;</text>
  <text x="1669" y="288" class="label">
    <tspan x="1669" dy="0">cmake --build</tspan>
  </text>
  <text x="1647" y="307" class="desc">
    <tspan x="1647" dy="0">Compile C++ sources and link binary</tspan>
  </text>
  <rect x="1633" y="380" width="260" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="1647" y="406" class="icon">&#xf135;</text>
  <text x="1669" y="408" class="label">
    <tspan x="1669" dy="0">Run native binary</tspan>
  </text>
  <text x="1647" y="427" class="desc">
    <tspan x="1647" dy="0">SDL3 desktop app with pybind11</tspan>
  </text>
  <rect x="1941" y="140" width="260" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1955" y="166" class="icon">&#xf17b;</text>
  <text x="1977" y="168" class="label">
    <tspan x="1977" dy="0">assembleDebug</tspan>
  </text>
  <text x="1955" y="187" class="desc">
    <tspan x="1955" dy="0">Gradle builds Android APK via NDK</tspan>
  </text>
  <rect x="1941" y="260" width="260" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1955" y="286" class="icon">&#xf1e6;</text>
  <text x="1977" y="288" class="label">
    <tspan x="1977" dy="0">Djinni + Chaquopy</tspan>
  </text>
  <text x="1955" y="307" class="desc">
    <tspan x="1955" dy="0">JNI bridge and embedded Python</tspan>
  </text>
  <rect x="1941" y="380" width="260" height="72" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1955" y="406" class="icon">&#xf3cd;</text>
  <text x="1977" y="408" class="label">
    <tspan x="1977" dy="0">Install APK</tspan>
  </text>
  <text x="1955" y="427" class="desc">
    <tspan x="1955" dy="0">Deploy to device or emulator</tspan>
  </text>
  <rect x="2249" y="140" width="260" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="2263" y="166" class="icon">&#xf0c2;</text>
  <text x="2285" y="168" class="label">
    <tspan x="2285" dy="0">deployToBuildsClient</tspan>
  </text>
  <text x="2263" y="187" class="desc">
    <tspan x="2263" dy="0">Copy client distro to builds/client/</tspan>
  </text>
