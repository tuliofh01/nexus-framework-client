  <line x1="330" y1="176" x2="340" y2="176" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="220" x2="470" y2="250" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="330" x2="470" y2="370" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="450" x2="470" y2="490" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="470" y1="570" x2="470" y2="610" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="646" x2="750" y2="220" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="220" x2="750" y2="250" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="330" x2="750" y2="360" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="440" x2="750" y2="470" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="750" y1="550" x2="750" y2="580" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="880" y1="396" x2="900" y2="396" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1120" y1="396" x2="1180" y2="286" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1290" y1="286" x2="1530" y2="220" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1290" y1="286" x2="1750" y2="220" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1530" y1="220" x2="1530" y2="250" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1530" y1="330" x2="1530" y2="360" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1750" y1="220" x2="1750" y2="250" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1750" y1="330" x2="1750" y2="360" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1750" y1="430" x2="1990" y2="286" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="600" y="660" width="360" height="70" class="panel" fill="#FFFDE7" stroke="#F9A825"/>
  <text x="620" y="688" class="small">Headless: ./gradlew :cli:run --args="generate …"</text>
  <text x="620" y="708" class="desc">Optional Docker path via misc/docker/</text>

  <rect x="24" y="760" width="500" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="40" y="782" class="legend-title">Pipeline stages</text>
  <rect x="40" y="784" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="62" y="796" class="small">Setup — JDK 26 + Git bootstrap</text>
  <rect x="290" y="784" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="312" y="796" class="small">Client — Compose Generate UI</text>
  <rect x="40" y="806" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="62" y="818" class="small">Core — template engine + emit</text>
  <rect x="290" y="806" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="312" y="818" class="small">Android — Gradle + Chaquopy path</text>
</svg>