<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1640 461" width="1640" height="461">
  <title>Langflow adoption workflow</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1640" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="210" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="56" y="149" class="icon">&#xf544;</text>
  <text x="78" y="151" class="label">
    <tspan x="78" dy="0">Langflow canvas</tspan>
  </text>
  <text x="56" y="171" class="desc">
    <tspan x="56" dy="0">Design DAG in external tool</tspan>
  </text>
  <rect x="306" y="120" width="210" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="322" y="149" class="icon">&#xf15b;</text>
  <text x="344" y="151" class="label">
    <tspan x="344" dy="0">Export JSON</tspan>
  </text>
  <text x="322" y="171" class="desc">
    <tspan x="322" dy="0">API or Export flow button</tspan>
  </text>
  <rect x="572" y="120" width="230" height="85" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="588" y="149" class="icon">&#xf013;</text>
  <text x="610" y="151" class="label">
    <tspan x="610" dy="0">Translate fields</tspan>
  </text>
  <text x="588" y="171" class="desc">
    <tspan x="588" dy="0">Manual map to Nexus schema</tspan>
    <tspan x="588" dy="15">(v1)</tspan>
  </text>
  <rect x="858" y="120" width="210" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="874" y="149" class="icon">&#xf466;</text>
  <text x="896" y="151" class="label">
    <tspan x="896" dy="0">flows/flows.json</tspan>
  </text>
  <text x="874" y="171" class="desc">
    <tspan x="874" dy="0">Place in generated project</tspan>
  </text>
  <rect x="1124" y="120" width="210" height="72" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1140" y="149" class="icon">&#xf013;</text>
  <text x="1162" y="151" class="label">
    <tspan x="1162" dy="0">nxs_config.json</tspan>
  </text>
  <text x="1140" y="171" class="desc">
    <tspan x="1140" dy="0">flows.enabled = true</tspan>
  </text>
  <rect x="1390" y="120" width="210" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1406" y="149" class="icon">&#xf135;</text>
  <text x="1428" y="151" class="label">
    <tspan x="1428" dy="0">FlowRunner</tspan>
  </text>
  <text x="1406" y="171" class="desc">
    <tspan x="1406" dy="0">Startup triggers registered</tspan>
  </text>
  <line x1="250" y1="156" x2="306" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="516" y1="156" x2="572" y2="162" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="802" y1="162" x2="858" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1068" y1="156" x2="1124" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1334" y1="156" x2="1390" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="261" width="1560" height="50" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="10"/>
  <text x="820" y="283" text-anchor="middle" class="small">App structure nodes → blueprint.json instead · LLM components become invoke stubs in python.module</text>
  <text x="820" y="301" text-anchor="middle" class="desc">Automatic Langflow importer planned for v1.1</text>
  <rect x="40" y="331" width="1560" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="353" class="legend-title">Adoption path</text>
  <rect x="56" y="355" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="367" class="small">External — Langflow authoring</text>
  <rect x="836" y="355" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="858" y="367" class="small">Translate — manual field mapping</text>
  <rect x="56" y="377" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="389" class="small">Ship — flows.json in project</text>
  <rect x="836" y="377" width="16" height="16" class="legend-box" fill="#3949AB" stroke="#3949AB"/>
  <text x="858" y="389" class="small">Runtime — FlowRunner at startup</text>
</svg>