<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1590 446" width="1590" height="446">
  <title>Langflow adoption workflow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1590" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="210" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="146" class="icon">&#xf544;</text>
  <text x="76" y="148" class="label">
    <tspan x="76" dy="0">Langflow canvas</tspan>
  </text>
  <text x="54" y="167" class="desc">
    <tspan x="54" dy="0">Design DAG in external tool</tspan>
  </text>
  <rect x="298" y="120" width="210" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="312" y="146" class="icon">&#xf15b;</text>
  <text x="334" y="148" class="label">
    <tspan x="334" dy="0">Export JSON</tspan>
  </text>
  <text x="312" y="167" class="desc">
    <tspan x="312" dy="0">API or Export flow button</tspan>
  </text>
  <rect x="556" y="120" width="220" height="78" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="570" y="146" class="icon">&#xf013;</text>
  <text x="592" y="148" class="label">
    <tspan x="592" dy="0">Translate fields</tspan>
  </text>
  <text x="570" y="167" class="desc">
    <tspan x="570" dy="0">Manual map to Nexus schema</tspan>
    <tspan x="570" dy="14">(v1)</tspan>
  </text>
  <rect x="824" y="120" width="210" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="838" y="146" class="icon">&#xf466;</text>
  <text x="860" y="148" class="label">
    <tspan x="860" dy="0">flows/flows.json</tspan>
  </text>
  <text x="838" y="167" class="desc">
    <tspan x="838" dy="0">Place in generated project</tspan>
  </text>
  <rect x="1082" y="120" width="210" height="72" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1096" y="146" class="icon">&#xf013;</text>
  <text x="1118" y="148" class="label">
    <tspan x="1118" dy="0">nxs_config.json</tspan>
  </text>
  <text x="1096" y="167" class="desc">
    <tspan x="1096" dy="0">flows.enabled = true</tspan>
  </text>
  <rect x="1340" y="120" width="210" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1354" y="146" class="icon">&#xf135;</text>
  <text x="1376" y="148" class="label">
    <tspan x="1376" dy="0">FlowRunner</tspan>
  </text>
  <text x="1354" y="167" class="desc">
    <tspan x="1354" dy="0">Startup triggers registered</tspan>
  </text>
  <line x1="250" y1="156" x2="298" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="508" y1="156" x2="556" y2="159" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="776" y1="159" x2="824" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1034" y1="156" x2="1082" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1292" y1="156" x2="1340" y2="156" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="246" width="1510" height="50" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="10"/>
  <text x="795" y="268" text-anchor="middle" class="small">App structure nodes → blueprint.json instead · LLM components become invoke stubs in python.module</text>
  <text x="795" y="286" text-anchor="middle" class="desc">Automatic Langflow importer planned for v1.1</text>
  <rect x="40" y="316" width="1510" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="338" class="legend-title">Adoption path</text>
  <rect x="56" y="340" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="352" class="small">External — Langflow authoring</text>
  <rect x="811" y="340" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="833" y="352" class="small">Translate — manual field mapping</text>
  <rect x="56" y="362" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="374" class="small">Ship — flows.json in project</text>
  <rect x="811" y="362" width="16" height="16" class="legend-box" fill="#3949AB" stroke="#3949AB"/>
  <text x="833" y="374" class="small">Runtime — FlowRunner at startup</text>
</svg>