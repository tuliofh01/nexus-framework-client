<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 420" width="1500" height="420">
  <title>Langflow adoption workflow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1500" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="190" height="64" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="52" y="142" class="icon">&#xf544;</text>
  <text x="74" y="142" class="label">Langflow canvas</text>
  <text x="52" y="174" class="desc">Design DAG in external tool</text>
  <rect x="260" y="120" width="190" height="64" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="272" y="142" class="icon">&#xf15b;</text>
  <text x="294" y="142" class="label">Export JSON</text>
  <text x="272" y="174" class="desc">API or Export flow button</text>
  <rect x="480" y="120" width="190" height="64" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="492" y="142" class="icon">&#xf013;</text>
  <text x="514" y="142" class="label">Translate fields</text>
  <text x="492" y="174" class="desc">Manual map to Nexus schema (v1)</text>
  <rect x="700" y="120" width="190" height="64" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="712" y="142" class="icon">&#xf466;</text>
  <text x="734" y="142" class="label">flows/flows.json</text>
  <text x="712" y="174" class="desc">Place in generated project</text>
  <rect x="920" y="120" width="190" height="64" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="932" y="142" class="icon">&#xf013;</text>
  <text x="954" y="142" class="label">nxs_config.json</text>
  <text x="932" y="174" class="desc">flows.enabled = true</text>
  <rect x="1140" y="120" width="190" height="64" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1152" y="142" class="icon">&#xf135;</text>
  <text x="1174" y="142" class="label">FlowRunner</text>
  <text x="1152" y="174" class="desc">Startup triggers registered</text>

  <line x1="230" y1="152" x2="260" y2="152" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="450" y1="152" x2="480" y2="152" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="670" y1="152" x2="700" y2="152" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="890" y1="152" x2="920" y2="152" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1110" y1="152" x2="1140" y2="152" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="240" width="1420" height="50" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="10"/>
  <text x="750" y="262" text-anchor="middle" class="small">App structure nodes → blueprint.json instead · LLM components become invoke stubs in python.module</text>
  <text x="750" y="280" text-anchor="middle" class="desc">Automatic Langflow importer planned for v1.1</text>
  <rect x="40" y="310" width="1420" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="332" class="legend-title">Adoption path</text>
  <rect x="56" y="334" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="346" class="small">External — Langflow authoring</text>
  <rect x="766" y="334" width="16" height="16" class="legend-box" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="788" y="346" class="small">Translate — manual field mapping</text>
  <rect x="56" y="356" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="368" class="small">Ship — flows.json in project</text>
  <rect x="766" y="356" width="16" height="16" class="legend-box" fill="#3949AB" stroke="#3949AB"/>
  <text x="788" y="368" class="small">Runtime — FlowRunner at startup</text>
</svg>