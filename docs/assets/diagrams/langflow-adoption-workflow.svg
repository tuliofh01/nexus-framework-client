<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1774 464" width="1774" height="464">
  <title>Langflow adoption workflow</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1774" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="210" height="72" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="56" y="149" class="icon">&#xf544;</text>
  <text x="78" y="151" class="label">
    <tspan x="78" dy="0">Langflow canvas</tspan>
  </text>
  <text x="56" y="171" class="desc">
    <tspan x="56" dy="0">Design DAG in external tool</tspan>
  </text>
  <rect x="306" y="120" width="210" height="72" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="322" y="149" class="icon">&#xf15b;</text>
  <text x="344" y="151" class="label">
    <tspan x="344" dy="0">Export JSON</tspan>
  </text>
  <text x="322" y="171" class="desc">
    <tspan x="322" dy="0">API or Export flow button</tspan>
  </text>
  <rect x="572" y="120" width="364" height="88" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="588" y="149" class="icon">&#xf013;</text>
  <text x="610" y="151" class="label">
    <tspan x="610" dy="0">LangflowTransformationEngine</tspan>
  </text>
  <text x="588" y="171" class="desc">
    <tspan x="588" dy="0">Automatic import · all flows enabled: false</tspan>
    <tspan x="588" dy="15">(v0.3.0)</tspan>
  </text>
  <rect x="992" y="120" width="210" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="1008" y="149" class="icon">&#xf466;</text>
  <text x="1030" y="151" class="label">
    <tspan x="1030" dy="0">flows/flows.json</tspan>
  </text>
  <text x="1008" y="171" class="desc">
    <tspan x="1008" dy="0">Place in generated project</tspan>
  </text>
  <rect x="1258" y="120" width="210" height="72" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1274" y="149" class="icon">&#xf013;</text>
  <text x="1296" y="151" class="label">
    <tspan x="1296" dy="0">nxs_config.json</tspan>
  </text>
  <text x="1274" y="171" class="desc">
    <tspan x="1274" dy="0">flows.enabled = true</tspan>
  </text>
  <rect x="1524" y="120" width="210" height="72" class="node" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="1540" y="149" class="icon">&#xf135;</text>
  <text x="1562" y="151" class="label">
    <tspan x="1562" dy="0">FlowRunner</tspan>
  </text>
  <text x="1540" y="171" class="desc">
    <tspan x="1540" dy="0">Startup triggers registered</tspan>
  </text>
  <line x1="250" y1="156" x2="306" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="516" y1="156" x2="572" y2="164" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="936" y1="164" x2="992" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1202" y1="156" x2="1258" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1468" y1="156" x2="1524" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="264" width="1694" height="50" fill="#FFFDE7" stroke="#F9A825" stroke-width="2" rx="10"/>
  <text x="887" y="286" text-anchor="middle" class="small">App structure nodes → blueprint.json instead · LLM components become invoke stubs in python.module</text>
  <text x="887" y="304" text-anchor="middle" class="desc">LangflowTransformationEngine alive in v0.3.0 — all imported flows default to enabled: false</text>
  <rect x="40" y="334" width="1694" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="356" class="legend-title">Adoption path</text>
  <rect x="56" y="358" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="370" class="small">External — Langflow authoring</text>
  <rect x="903" y="358" width="16" height="16" class="legend-box" fill="#E8EAF6" stroke="#3949AB"/>
  <text x="925" y="370" class="small">Transform — LangflowTransformationEngine (v0.3.0)</text>
  <rect x="56" y="380" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="392" class="small">Ship — flows.json in project</text>
  <rect x="903" y="380" width="16" height="16" class="legend-box" fill="#3949AB" stroke="#3949AB"/>
  <text x="925" y="392" class="small">Runtime — FlowRunner at startup</text>
</svg>