  <!-- ====== shared bar ====== -->
  <rect x="30" y="530" width="1040" height="40" rx="20" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="550" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a6e3a1">template/shared/ — runtime modules (font_config, nexus_theme, paths, script_archive, script_crypto, zig_allocator) &middot; DSL (core.ts, components.ts, tags.ts) &middot; themes (json) &middot; assets (flamingo.svg, nexus-logo.png)</text>

  <text x="550" y="610" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#585b70">Desktop: zig build + pybind11 · Android: Gradle APK + Zig JNI + Chaquopy</text>
</svg>
