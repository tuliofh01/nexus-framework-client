<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 580" width="1240" height="580">
  <title>Langflow, n8n, and Nexus blueprints</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1240" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <rect x="24" y="88" width="360" height="420" class="panel" fill="#E8F5E9" stroke="#2E7D32" fill-opacity="0.35"/>
  <text x="38" y="112" class="layer-label">&#xf544; Langflow</text>
  <text x="204" y="130" text-anchor="middle" class="desc">ML / LLM flow DAG · Runtime execution</text>
  <rect x="64" y="150" width="195" height="78" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="78" y="176" class="icon">&#xf075;</text>
  <text x="100" y="178" class="label">
    <tspan x="100" dy="0">Prompt</tspan>
  </text>
  <text x="78" y="197" class="desc">
    <tspan x="78" dy="0">User text input to the</tspan>
    <tspan x="78" dy="14">flow</tspan>
  </text>
  <rect x="224" y="150" width="214" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="238" y="176" class="icon">&#xf544;</text>
  <text x="260" y="178" class="label">
    <tspan x="260" dy="0">LLM</tspan>
  </text>
  <text x="238" y="197" class="desc">
    <tspan x="238" dy="0">Inference node calls model API</tspan>
  </text>
  <rect x="144" y="250" width="201" height="78" class="node" fill="#FFFFFF" stroke="#EF6C00"/>
  <text x="158" y="276" class="icon">&#xf121;</text>
  <text x="180" y="278" class="label">
    <tspan x="180" dy="0">Parser</tspan>
  </text>
  <text x="158" y="297" class="desc">
    <tspan x="158" dy="0">Structured output</tspan>
    <tspan x="158" dy="14">extraction</tspan>
  </text>
  <line x1="184" y1="208" x2="224" y2="179" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="284" y1="208" x2="204" y2="240" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="44" y="330" class="small">• Typed nodes (model, tool, memory)</text>
  <text x="44" y="350" class="small">• Runs when user invokes the flow</text>
  <text x="44" y="370" class="desc">Output: inference / chat response</text>

  <rect x="420" y="88" width="360" height="420" class="panel" fill="#FCE4EC" stroke="#C2185B" fill-opacity="0.35"/>
  <text x="434" y="112" class="layer-label">&#xf1e6; n8n</text>
  <text x="600" y="130" text-anchor="middle" class="desc">Workflow automation · Runtime execution</text>
  <rect x="460" y="150" width="201" height="78" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="474" y="176" class="icon">&#xf0c2;</text>
  <text x="496" y="178" class="label">
    <tspan x="496" dy="0">Webhook</tspan>
  </text>
  <text x="474" y="197" class="desc">
    <tspan x="474" dy="0">HTTP trigger starts</tspan>
    <tspan x="474" dy="14">workflow</tspan>
  </text>
  <rect x="620" y="150" width="176" height="78" class="node" fill="#FFFFFF" stroke="#3949AB"/>
  <text x="634" y="176" class="icon">&#xf1e6;</text>
  <text x="656" y="178" class="label">
    <tspan x="656" dy="0">HTTP Request</tspan>
  </text>
  <text x="634" y="197" class="desc">
    <tspan x="634" dy="0">Calls external REST</tspan>
    <tspan x="634" dy="14">APIs</tspan>
  </text>
  <rect x="540" y="250" width="176" height="78" class="node" fill="#FFFFFF" stroke="#00695C"/>
  <text x="554" y="276" class="icon">&#xf075;</text>
  <text x="576" y="278" class="label">
    <tspan x="576" dy="0">Slack</tspan>
  </text>
  <text x="554" y="297" class="desc">
    <tspan x="554" dy="0">Posts message to</tspan>
    <tspan x="554" dy="14">channel</tspan>
  </text>
  <line x1="580" y1="179" x2="620" y2="179" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="680" y1="208" x2="600" y2="240" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="330" class="small">• Triggers + integration steps</text>
  <text x="440" y="350" class="small">• Runs on schedule or webhook</text>
  <text x="440" y="370" class="desc">Output: side effects (API calls)</text>

  <rect x="816" y="88" width="400" height="420" class="panel" fill="#F3E5F5" stroke="#6A1B9A" fill-opacity="0.35"/>
  <text x="830" y="112" class="layer-label">&#xf15b; Nexus blueprint.json</text>
  <text x="1016" y="130" text-anchor="middle" class="badge">Design-time codegen</text>
  <rect x="836" y="150" width="201" height="78" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="850" y="176" class="icon">&#xe73c;</text>
  <text x="872" y="178" class="label">
    <tspan x="872" dy="0">python.module</tspan>
  </text>
  <text x="850" y="197" class="desc">
    <tspan x="850" dy="0">Analytics hooks in</tspan>
    <tspan x="850" dy="14">blueprint</tspan>
  </text>
  <rect x="1006" y="150" width="164" height="78" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="1020" y="176" class="icon">&#xf1c0;</text>
  <text x="1042" y="178" class="label">
    <tspan x="1042" dy="0">cpp.model</tspan>
  </text>
  <text x="1020" y="197" class="desc">
    <tspan x="1020" dy="0">Domain state node</tspan>
    <tspan x="1020" dy="14">type</tspan>
  </text>
  <rect x="896" y="240" width="160" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="910" y="266" class="icon">&#xf013;</text>
  <text x="932" y="268" class="label">
    <tspan x="932" dy="0">cpp.controller</tspan>
  </text>
  <text x="910" y="287" class="desc">
    <tspan x="910" dy="0">Command routing layer</tspan>
  </text>
  <rect x="1066" y="240" width="170" height="78" class="node" fill="#FFFFFF" stroke="#EF6C00"/>
  <text x="1080" y="266" class="icon">&#xf5fd;</text>
  <text x="1102" y="268" class="label">
    <tspan x="1102" dy="0">ui.page</tspan>
  </text>
  <text x="1080" y="287" class="desc">
    <tspan x="1080" dy="0">ImGui screen</tspan>
    <tspan x="1080" dy="14">definition</tspan>
  </text>
  <rect x="986" y="330" width="160" height="72" class="node" fill="#FFFFFF" stroke="#00838F"/>
  <text x="1000" y="356" class="icon">&#xf120;</text>
  <text x="1022" y="358" class="label">
    <tspan x="1022" dy="0">lua.script</tspan>
  </text>
  <text x="1000" y="377" class="desc">
    <tspan x="1000" dy="0">sol2 panel bindings</tspan>
  </text>
  <line x1="891" y1="176" x2="951" y2="218" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="951" y1="270" x2="1021" y2="202" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1081" y1="244" x2="1026" y2="218" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="836" y="360" class="small">• Langflow-style typed DAG (not n8n triggers)</text>
  <text x="836" y="380" class="small">• Consumed at generate time (:core)</text>
  <text x="836" y="400" class="desc">Output: C++/Lua/Python/UI project tree</text>

  <rect x="24" y="520" width="1192" height="44" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="620" y="548" text-anchor="middle" class="small">Nexus maps Langflow mental model (typed nodes + edges) to native app codegen — not runtime webhook automation.</text>
</svg>