<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1675 580" width="1675" height="580">
  <title>Langflow, n8n, and Nexus blueprints</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1675" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>

  <rect x="24" y="88" width="528" height="420" class="panel" fill="#E8F5E9" stroke="#2E7D32" fill-opacity="0.35"/>
  <text x="38" y="112" class="layer-label">&#xf544; Langflow</text>
  <text x="288" y="130" text-anchor="middle" class="desc">ML / LLM flow DAG · Runtime execution</text>
  <rect x="44" y="150" width="204" height="85" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="60" y="179" class="icon">&#xf075;</text>
  <text x="82" y="181" class="label">
    <tspan x="82" dy="0">Prompt</tspan>
  </text>
  <text x="60" y="201" class="desc">
    <tspan x="60" dy="0">User text input to the</tspan>
    <tspan x="60" dy="15">flow</tspan>
  </text>
  <rect x="304" y="150" width="224" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="320" y="179" class="icon">&#xf544;</text>
  <text x="342" y="181" class="label">
    <tspan x="342" dy="0">LLM</tspan>
  </text>
  <text x="320" y="201" class="desc">
    <tspan x="320" dy="0">Inference node calls model API</tspan>
  </text>
  <rect x="86" y="291" width="211" height="85" class="node" fill="#FFFFFF" stroke="#EF6C00"/>
  <text x="102" y="320" class="icon">&#xf121;</text>
  <text x="124" y="322" class="label">
    <tspan x="124" dy="0">Parser</tspan>
  </text>
  <text x="102" y="342" class="desc">
    <tspan x="102" dy="0">Structured output</tspan>
    <tspan x="102" dy="15">extraction</tspan>
  </text>
  <line x1="248" y1="192" x2="304" y2="186" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M416,222 Q333,256 191,291" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="44" y="416" class="small">• Typed nodes (model, tool, memory)</text>
  <text x="44" y="436" class="small">• Runs when user invokes the flow</text>
  <text x="44" y="456" class="desc">Output: inference / chat response</text>
  <rect x="608" y="88" width="496" height="420" class="panel" fill="#FCE4EC" stroke="#C2185B" fill-opacity="0.35"/>
  <text x="622" y="112" class="layer-label">&#xf1e6; n8n</text>
  <text x="856" y="130" text-anchor="middle" class="desc">Workflow automation · Runtime execution</text>
  <rect x="628" y="150" width="211" height="85" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="644" y="179" class="icon">&#xf0c2;</text>
  <text x="666" y="181" class="label">
    <tspan x="666" dy="0">Webhook</tspan>
  </text>
  <text x="644" y="201" class="desc">
    <tspan x="644" dy="0">HTTP trigger starts</tspan>
    <tspan x="644" dy="15">workflow</tspan>
  </text>
  <rect x="895" y="150" width="185" height="85" class="node" fill="#FFFFFF" stroke="#3949AB"/>
  <text x="911" y="179" class="icon">&#xf1e6;</text>
  <text x="933" y="181" class="label">
    <tspan x="933" dy="0">HTTP Request</tspan>
  </text>
  <text x="911" y="201" class="desc">
    <tspan x="911" dy="0">Calls external REST</tspan>
    <tspan x="911" dy="15">APIs</tspan>
  </text>
  <rect x="663" y="291" width="185" height="85" class="node" fill="#FFFFFF" stroke="#00695C"/>
  <text x="679" y="320" class="icon">&#xf075;</text>
  <text x="701" y="322" class="label">
    <tspan x="701" dy="0">Slack</tspan>
  </text>
  <text x="679" y="342" class="desc">
    <tspan x="679" dy="0">Posts message to</tspan>
    <tspan x="679" dy="15">channel</tspan>
  </text>
  <line x1="839" y1="192" x2="895" y2="192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M987,235 Q901,263 755,291" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="628" y="416" class="small">• Triggers + integration steps</text>
  <text x="628" y="436" class="small">• Runs on schedule or webhook</text>
  <text x="628" y="456" class="desc">Output: side effects (API calls)</text>
  <rect x="1160" y="88" width="491" height="420" class="panel" fill="#F3E5F5" stroke="#6A1B9A" fill-opacity="0.35"/>
  <text x="1174" y="112" class="layer-label">&#xf15b; Nexus blueprint.json</text>
  <text x="1405" y="130" text-anchor="middle" class="badge">Design-time codegen</text>
  <rect x="1180" y="150" width="211" height="85" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="1196" y="179" class="icon">&#xe73c;</text>
  <text x="1218" y="181" class="label">
    <tspan x="1218" dy="0">python.module</tspan>
  </text>
  <text x="1196" y="201" class="desc">
    <tspan x="1196" dy="0">Analytics hooks in</tspan>
    <tspan x="1196" dy="15">blueprint</tspan>
  </text>
  <rect x="1447" y="150" width="180" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="1463" y="179" class="icon">&#xf1c0;</text>
  <text x="1485" y="181" class="label">
    <tspan x="1485" dy="0">cpp.model</tspan>
  </text>
  <text x="1463" y="201" class="desc">
    <tspan x="1463" dy="0">Domain state node type</tspan>
  </text>
  <rect x="1180" y="291" width="180" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="1196" y="320" class="icon">&#xf013;</text>
  <text x="1218" y="322" class="label">
    <tspan x="1218" dy="0">cpp.controller</tspan>
  </text>
  <text x="1196" y="342" class="desc">
    <tspan x="1196" dy="0">Command routing layer</tspan>
  </text>
  <rect x="1416" y="291" width="180" height="72" class="node" fill="#FFFFFF" stroke="#EF6C00"/>
  <text x="1432" y="320" class="icon">&#xf5fd;</text>
  <text x="1454" y="322" class="label">
    <tspan x="1454" dy="0">ui.page</tspan>
  </text>
  <text x="1432" y="342" class="desc">
    <tspan x="1432" dy="0">ImGui screen definition</tspan>
  </text>
  <rect x="1200" y="419" width="180" height="72" class="node" fill="#FFFFFF" stroke="#00838F"/>
  <text x="1216" y="448" class="icon">&#xf120;</text>
  <text x="1238" y="450" class="label">
    <tspan x="1238" dy="0">lua.script</tspan>
  </text>
  <text x="1216" y="470" class="desc">
    <tspan x="1216" dy="0">sol2 panel bindings</tspan>
  </text>
  <path d="M1285,235 Q1257,263 1270,291" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1270,363 Q1300,391 1290,419" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1537,222 Q1541,256 1506,291" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1180" y="531" class="small">• Langflow-style typed DAG (not n8n triggers)</text>
  <text x="1180" y="551" class="small">• Consumed at generate time (:core)</text>
  <text x="1180" y="571" class="desc">Output: C++/Lua/Python/UI project tree</text>

  <rect x="24" y="520" width="1627" height="44" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="837" y="548" text-anchor="middle" class="small">Nexus maps Langflow mental model (typed nodes + edges) to native app codegen — not runtime webhook automation.</text>
</svg>