<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1571 580" width="1571" height="580">
  <title>Langflow, n8n, and Nexus blueprints</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1571" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <rect x="24" y="88" width="501" height="420" class="panel" fill="#E8F5E9" stroke="#2E7D32" fill-opacity="0.35"/>
  <text x="38" y="112" class="layer-label">&#xf544; Langflow</text>
  <text x="274" y="130" text-anchor="middle" class="desc">ML / LLM flow DAG · Runtime execution</text>
  <rect x="44" y="150" width="195" height="78" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="58" y="176" class="icon">&#xf075;</text>
  <text x="80" y="178" class="label">
    <tspan x="80" dy="0">Prompt</tspan>
  </text>
  <text x="58" y="197" class="desc">
    <tspan x="58" dy="0">User text input to the</tspan>
    <tspan x="58" dy="14">flow</tspan>
  </text>
  <rect x="287" y="150" width="214" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="301" y="176" class="icon">&#xf544;</text>
  <text x="323" y="178" class="label">
    <tspan x="323" dy="0">LLM</tspan>
  </text>
  <text x="301" y="197" class="desc">
    <tspan x="301" dy="0">Inference node calls model API</tspan>
  </text>
  <rect x="81" y="276" width="201" height="78" class="node" fill="#FFFFFF" stroke="#EF6C00"/>
  <text x="95" y="302" class="icon">&#xf121;</text>
  <text x="117" y="304" class="label">
    <tspan x="117" dy="0">Parser</tspan>
  </text>
  <text x="95" y="323" class="desc">
    <tspan x="95" dy="0">Structured output</tspan>
    <tspan x="95" dy="14">extraction</tspan>
  </text>
  <line x1="239" y1="189" x2="287" y2="186" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M394,222 Q317,249 181,276" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="44" y="394" class="small">• Typed nodes (model, tool, memory)</text>
  <text x="44" y="414" class="small">• Runs when user invokes the flow</text>
  <text x="44" y="434" class="desc">Output: inference / chat response</text>
  <rect x="573" y="88" width="469" height="420" class="panel" fill="#FCE4EC" stroke="#C2185B" fill-opacity="0.35"/>
  <text x="587" y="112" class="layer-label">&#xf1e6; n8n</text>
  <text x="807" y="130" text-anchor="middle" class="desc">Workflow automation · Runtime execution</text>
  <rect x="593" y="150" width="201" height="78" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="607" y="176" class="icon">&#xf0c2;</text>
  <text x="629" y="178" class="label">
    <tspan x="629" dy="0">Webhook</tspan>
  </text>
  <text x="607" y="197" class="desc">
    <tspan x="607" dy="0">HTTP trigger starts</tspan>
    <tspan x="607" dy="14">workflow</tspan>
  </text>
  <rect x="842" y="150" width="176" height="78" class="node" fill="#FFFFFF" stroke="#3949AB"/>
  <text x="856" y="176" class="icon">&#xf1e6;</text>
  <text x="878" y="178" class="label">
    <tspan x="878" dy="0">HTTP Request</tspan>
  </text>
  <text x="856" y="197" class="desc">
    <tspan x="856" dy="0">Calls external REST</tspan>
    <tspan x="856" dy="14">APIs</tspan>
  </text>
  <rect x="623" y="276" width="176" height="78" class="node" fill="#FFFFFF" stroke="#00695C"/>
  <text x="637" y="302" class="icon">&#xf075;</text>
  <text x="659" y="304" class="label">
    <tspan x="659" dy="0">Slack</tspan>
  </text>
  <text x="637" y="323" class="desc">
    <tspan x="637" dy="0">Posts message to</tspan>
    <tspan x="637" dy="14">channel</tspan>
  </text>
  <line x1="794" y1="189" x2="842" y2="189" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M930,228 Q850,252 711,276" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="593" y="394" class="small">• Triggers + integration steps</text>
  <text x="593" y="414" class="small">• Runs on schedule or webhook</text>
  <text x="593" y="434" class="desc">Output: side effects (API calls)</text>
  <rect x="1090" y="88" width="457" height="420" class="panel" fill="#F3E5F5" stroke="#6A1B9A" fill-opacity="0.35"/>
  <text x="1104" y="112" class="layer-label">&#xf15b; Nexus blueprint.json</text>
  <text x="1318" y="130" text-anchor="middle" class="badge">Design-time codegen</text>
  <rect x="1110" y="150" width="201" height="78" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="1124" y="176" class="icon">&#xe73c;</text>
  <text x="1146" y="178" class="label">
    <tspan x="1146" dy="0">python.module</tspan>
  </text>
  <text x="1124" y="197" class="desc">
    <tspan x="1124" dy="0">Analytics hooks in</tspan>
    <tspan x="1124" dy="14">blueprint</tspan>
  </text>
  <rect x="1359" y="150" width="164" height="78" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="1373" y="176" class="icon">&#xf1c0;</text>
  <text x="1395" y="178" class="label">
    <tspan x="1395" dy="0">cpp.model</tspan>
  </text>
  <text x="1373" y="197" class="desc">
    <tspan x="1373" dy="0">Domain state node</tspan>
    <tspan x="1373" dy="14">type</tspan>
  </text>
  <rect x="1110" y="276" width="160" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="1124" y="302" class="icon">&#xf013;</text>
  <text x="1146" y="304" class="label">
    <tspan x="1146" dy="0">cpp.controller</tspan>
  </text>
  <text x="1124" y="323" class="desc">
    <tspan x="1124" dy="0">Command routing layer</tspan>
  </text>
  <rect x="1318" y="276" width="170" height="78" class="node" fill="#FFFFFF" stroke="#EF6C00"/>
  <text x="1332" y="302" class="icon">&#xf5fd;</text>
  <text x="1354" y="304" class="label">
    <tspan x="1354" dy="0">ui.page</tspan>
  </text>
  <text x="1332" y="323" class="desc">
    <tspan x="1332" dy="0">ImGui screen</tspan>
    <tspan x="1332" dy="14">definition</tspan>
  </text>
  <rect x="1125" y="396" width="160" height="72" class="node" fill="#FFFFFF" stroke="#00838F"/>
  <text x="1139" y="422" class="icon">&#xf120;</text>
  <text x="1161" y="424" class="label">
    <tspan x="1161" dy="0">lua.script</tspan>
  </text>
  <text x="1139" y="443" class="desc">
    <tspan x="1139" dy="0">sol2 panel bindings</tspan>
  </text>
  <path d="M1210,228 Q1180,252 1190,276" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1190,348 Q1217,372 1205,396" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M1441,228 Q1442,252 1403,276" fill="none" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="1110" y="508" class="small">• Langflow-style typed DAG (not n8n triggers)</text>
  <text x="1110" y="528" class="small">• Consumed at generate time (:core)</text>
  <text x="1110" y="548" class="desc">Output: C++/Lua/Python/UI project tree</text>

  <rect x="24" y="520" width="1523" height="44" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="785" y="548" text-anchor="middle" class="small">Nexus maps Langflow mental model (typed nodes + edges) to native app codegen — not runtime webhook automation.</text>
</svg>