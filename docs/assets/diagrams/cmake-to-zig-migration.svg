<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1660 516" width="1660" height="516">
  <title>CMake to Zig migration timeline</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1660" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>

  <rect x="40" y="160" width="1560" height="36" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="8"/>
  <text x="820" y="184" text-anchor="middle" class="layer-label">CMake → Zig phased migration</text>

  <rect x="60" y="180" width="220" height="100" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="76" y="209" class="icon">&#xf0ad;</text>
  <text x="98" y="211" class="label">
    <tspan x="98" dy="0">Phase 0: Zig install</tspan>
  </text>
  <text x="76" y="231" class="desc">
    <tspan x="76" dy="0">setup.zig + env.sh</tspan>
  </text>
  <text x="170" y="296" text-anchor="middle" class="badge">✅</text>
  <rect x="320" y="180" width="220" height="100" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="336" y="209" class="icon">&#xf013;</text>
  <text x="358" y="211" class="label">
    <tspan x="358" dy="0">Phase 1: zig-services</tspan>
  </text>
  <text x="336" y="231" class="desc">
    <tspan x="336" dy="0">C++ TUs via zig c++</tspan>
  </text>
  <text x="430" y="296" text-anchor="middle" class="badge">✅</text>
  <rect x="580" y="180" width="221" height="100" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="596" y="209" class="icon">&#xf126;</text>
  <text x="618" y="211" class="label">
    <tspan x="618" dy="0">Phase 2: Langflow</tspan>
    <tspan x="618" dy="18">imp.</tspan>
  </text>
  <text x="596" y="249" class="desc">
    <tspan x="596" dy="0">Kotlin service (parallel)</tspan>
  </text>
  <text x="690" y="296" text-anchor="middle" class="badge">✅</text>
  <rect x="840" y="180" width="266" height="100" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="856" y="209" class="icon">&#xf108;</text>
  <text x="878" y="211" class="label">
    <tspan x="878" dy="0">Phase 3: Desktop Zig</tspan>
    <tspan x="878" dy="18">default</tspan>
  </text>
  <text x="856" y="249" class="desc">
    <tspan x="856" dy="0">Zig primary + CMake fallback</tspan>
  </text>
  <text x="950" y="296" text-anchor="middle" class="badge">✅</text>
  <rect x="1100" y="180" width="236" height="100" class="node" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="1116" y="209" class="icon">&#xf3cd;</text>
  <text x="1138" y="211" class="label">
    <tspan x="1138" dy="0">Phase 4: Android Zig</tspan>
    <tspan x="1138" dy="18">JNI</tspan>
  </text>
  <text x="1116" y="249" class="desc">
    <tspan x="1116" dy="0">Retire Djinni — C++ jni/ files</tspan>
  </text>
  <text x="1210" y="296" text-anchor="middle" class="badge">✅</text>
  <rect x="1360" y="180" width="228" height="100" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1376" y="209" class="icon">&#xf1c0;</text>
  <text x="1398" y="211" class="label">
    <tspan x="1398" dy="0">Phase 5:</tspan>
    <tspan x="1398" dy="18">ArenaAllocator</tspan>
  </text>
  <text x="1376" y="249" class="desc">
    <tspan x="1376" dy="0">Opt-in C-ABI hotspots</tspan>
  </text>
  <text x="1470" y="296" text-anchor="middle" class="badge">✅</text>
  <line x1="40" y1="336" x2="1600" y2="336" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="170" y="326" text-anchor="middle" class="small">CMake dominant</text>
  <text x="690" y="326" text-anchor="middle" class="small">Phased migration</text>
  <text x="1470" y="326" text-anchor="middle" class="small">Zig dominant</text>

  <rect x="60" y="396" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="76" y="418" class="legend-title">Phase status</text>
  <rect x="76" y="420" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="98" y="432" class="small">✅ Done — Phase 0 (Zig install)</text>
  <rect x="336" y="420" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="358" y="432" class="small">✅ Done — Phases 1, 3 (zig-services, desktop)</text>
  <rect x="76" y="442" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="98" y="454" class="small">Phase 4 (Android Zig JNI)</text>
  <rect x="336" y="442" width="16" height="16" class="legend-box" fill="#E0F7FA" stroke="#00838F"/>
  <text x="358" y="454" class="small">Phase 5 (ArenaAllocator)</text>
</svg>