<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <title>Python desktop vs Android embedding flow</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1280" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>

  <rect x="440" y="56" width="420" height="72" class="node" fill="#FFF8E1" stroke="#F57F17"/>
  <text x="454" y="82" class="icon">&#xf15b;</text>
  <text x="476" y="84" class="mono">
    <tspan x="476" dy="0">blueprint.json</tspan>
  </text>
  <text x="454" y="103" class="desc">
    <tspan x="454" dy="0">python.module port evaluate</tspan>
  </text>

  <rect x="40" y="150" width="580" height="440" class="panel" fill="#E3F2FD" stroke="#1565C0" fill-opacity="0.35"/>
  <text x="54" y="174" class="layer-label">&#xf108; Desktop path</text>
  <rect x="80" y="200" width="260" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="94" y="226" class="icon">&#xe73c;</text>
  <text x="116" y="228" class="label">
    <tspan x="116" dy="0">python/functions.py</tspan>
  </text>
  <text x="94" y="247" class="desc">
    <tspan x="94" dy="0">NumPy curve sampling source</tspan>
  </text>
  <rect x="360" y="200" width="240" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="374" y="226" class="icon">&#xf013;</text>
  <text x="396" y="228" class="label">
    <tspan x="396" dy="0">CMake: pack_python_dat</tspan>
  </text>
  <text x="374" y="247" class="desc">
    <tspan x="374" dy="0">Build step packs PYAC archive</tspan>
  </text>
  <rect x="80" y="300" width="260" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="94" y="326" class="icon">&#xf466;</text>
  <text x="116" y="328" class="label">
    <tspan x="116" dy="0">misc/python.dat (PYAC)</tspan>
  </text>
  <text x="94" y="347" class="desc">
    <tspan x="94" dy="0">Encrypted script pack in misc/</tspan>
  </text>
  <rect x="360" y="300" width="240" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="374" y="326" class="icon">&#xe73c;</text>
  <text x="396" y="328" class="label">
    <tspan x="396" dy="0">PythonEngine</tspan>
  </text>
  <text x="374" y="347" class="desc">
    <tspan x="374" dy="0">pybind11 embed in controller/</tspan>
  </text>

  <rect x="680" y="150" width="580" height="440" class="panel" fill="#FCE4EC" stroke="#C2185B" fill-opacity="0.35"/>
  <text x="694" y="174" class="layer-label">&#xf3cd; Android path</text>
  <rect x="720" y="200" width="300" height="72" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="734" y="226" class="icon">&#xe73c;</text>
  <text x="756" y="228" class="label">
    <tspan x="756" dy="0">app/src/main/python/</tspan>
  </text>
  <text x="734" y="247" class="desc">
    <tspan x="734" dy="0">functions.py in APK tree</tspan>
  </text>
  <rect x="1040" y="200" width="214" height="72" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="1054" y="226" class="icon">&#xf17b;</text>
  <text x="1076" y="228" class="label">
    <tspan x="1076" dy="0">Gradle + Chaquopy</tspan>
  </text>
  <text x="1054" y="247" class="desc">
    <tspan x="1054" dy="0">No python.dat — sources in APK</tspan>
  </text>
  <rect x="720" y="300" width="520" height="80" class="node" fill="#FFFFFF" stroke="#C2185B"/>
  <text x="734" y="326" class="icon">&#xf1e6;</text>
  <text x="756" y="328" class="label">
    <tspan x="756" dy="0">ChaquopyPythonBridge (Djinni)</tspan>
  </text>
  <text x="734" y="347" class="desc">
    <tspan x="734" dy="0">Type-safe C++ ↔ Kotlin JNI bridge</tspan>
  </text>

  <rect x="200" y="520" width="880" height="130" class="panel" fill="#F3E5F5" stroke="#6A1B9A" fill-opacity="0.35"/>
  <text x="214" y="544" class="layer-label">&#xf080; Shared MVC output (both templates)</text>
  <rect x="240" y="560" width="240" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="254" y="586" class="icon">&#xf013;</text>
  <text x="276" y="588" class="label">
    <tspan x="276" dy="0">PlotController</tspan>
  </text>
  <text x="254" y="607" class="desc">
    <tspan x="254" dy="0">Routes evaluate to model cache</tspan>
  </text>
  <rect x="520" y="560" width="240" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="534" y="586" class="icon">&#xf1c0;</text>
  <text x="556" y="588" class="label">
    <tspan x="556" dy="0">FunctionRegistry</tspan>
  </text>
  <text x="534" y="607" class="desc">
    <tspan x="534" dy="0">Active curves and samples</tspan>
  </text>
  <rect x="800" y="560" width="260" height="72" class="node" fill="#FFFFFF" stroke="#6A1B9A"/>
  <text x="814" y="586" class="icon">&#xf080;</text>
  <text x="836" y="588" class="label">
    <tspan x="836" dy="0">ImPlot draw</tspan>
  </text>
  <text x="814" y="607" class="desc">
    <tspan x="814" dy="0">Renders curves each frame</tspan>
  </text>

  <line x1="640" y1="114" x2="200" y2="150" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="420" y="126" text-anchor="middle" class="small">Desktop</text>
  <line x1="640" y1="114" x2="960" y2="150" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="800" y="126" text-anchor="middle" class="small">Android</text>
  <line x1="200" y1="258" x2="200" y2="290" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="229" x2="200" y2="229" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="348" x2="200" y2="500" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="360" y1="319" x2="360" y2="500" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="960" y1="258" x2="960" y2="290" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="970" y1="348" x2="970" y2="500" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="569" x2="500" y2="569" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="569" x2="760" y2="569" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="40" y="640" width="520" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="662" class="legend-title">Python embed layers</text>
  <rect x="56" y="664" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="78" y="676" class="small">Desktop — pybind11 + python.dat</text>
  <rect x="316" y="664" width="16" height="16" class="legend-box" fill="#FCE4EC" stroke="#C2185B"/>
  <text x="338" y="676" class="small">Android — Chaquopy + Djinni</text>
  <rect x="56" y="686" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#6A1B9A"/>
  <text x="78" y="698" class="small">Shared — controller → ImPlot</text>
</svg>