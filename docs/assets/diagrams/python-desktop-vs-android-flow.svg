<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 820" width="860" height="820">
  <title>Python desktop vs Android embedding flow</title>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#585b70"/>
    </marker>
  </defs>
  <rect width="860" height="100%" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="36" fill="#181825"/>
  <circle cx="16" cy="18" r="5" fill="#f38ba8"/>
  <circle cx="34" cy="18" r="5" fill="#fab387"/>
  <circle cx="52" cy="18" r="5" fill="#a6e3a1"/>
  <text x="430" y="24" font-family="sans-serif" font-weight="bold" font-size="14" fill="#cdd6f4" text-anchor="middle">Python embedding — desktop vs Android</text>

  <!-- Blueprint node -->
  <rect x="255" y="58" width="350" height="66" rx="8" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="271" y="84" font-family="sans-serif" font-size="14">📄</text>
  <text x="291" y="85" font-family="sans-serif" font-weight="bold" font-size="14" fill="#cdd6f4">blueprint.json</text>
  <text x="271" y="107" font-family="sans-serif" font-style="italic" font-size="12" fill="#a6adc8">python.module port evaluate</text>

  <!-- Blueprint to panels arrows -->
  <path d="M 430,124 L 222,124 L 222,167" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 430,124 L 637,124 L 637,167" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="222" y="142" font-family="sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">🖥️ Desktop</text>
  <text x="637" y="142" font-family="sans-serif" font-size="12" fill="#a6adc8" text-anchor="middle">📱 Android</text>

  <!-- ===== Desktop panel ===== -->
  <rect x="30" y="175" width="385" height="290" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="50" y="200" font-family="sans-serif" font-weight="bold" font-size="15" fill="#89b4fa">🖥️ Desktop path</text>

  <rect x="50" y="220" width="170" height="70" rx="6" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="66" y="247" font-family="sans-serif" font-size="14">📄</text>
  <text x="86" y="247" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">python/functions.py</text>
  <text x="66" y="270" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">NumPy curve sampling source</text>

  <rect x="235" y="220" width="170" height="80" rx="6" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="251" y="247" font-family="sans-serif" font-size="14">🔧</text>
  <text x="271" y="248" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">zig build: pack python</text>
  <text x="271" y="265" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">dat</text>
  <text x="251" y="288" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">PYAC archive defined in build.zig</text>

  <rect x="50" y="325" width="170" height="70" rx="6" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="66" y="352" font-family="sans-serif" font-size="14">📄</text>
  <text x="86" y="352" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">misc/python.dat (PYAC)</text>
  <text x="66" y="375" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">Encrypted script pack in build step</text>

  <rect x="235" y="325" width="170" height="70" rx="6" fill="#45475a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="251" y="352" font-family="sans-serif" font-size="14">⚡</text>
  <text x="271" y="352" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">PythonEngine</text>
  <text x="251" y="375" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">pybind11 embed in controller/</text>

  <!-- Desktop internal arrows -->
  <line x1="135" y1="290" x2="135" y2="317" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="300" x2="320" y2="317" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Android panel ===== -->
  <rect x="445" y="175" width="385" height="290" rx="10" fill="#313244" stroke="#f5c2e7" stroke-width="2"/>
  <text x="465" y="200" font-family="sans-serif" font-weight="bold" font-size="15" fill="#f5c2e7">📱 Android path</text>

  <rect x="460" y="220" width="180" height="70" rx="6" fill="#45475a" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="476" y="247" font-family="sans-serif" font-size="14">📄</text>
  <text x="496" y="247" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">app/src/main/python/</text>
  <text x="476" y="270" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">functions.py in APK tree</text>

  <rect x="650" y="220" width="165" height="70" rx="6" fill="#45475a" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="666" y="247" font-family="sans-serif" font-size="14">🔧</text>
  <text x="686" y="247" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">Gradle + Chaquopy</text>
  <text x="666" y="270" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">No python.dat — sources in APK</text>

  <rect x="460" y="325" width="355" height="70" rx="6" fill="#45475a" stroke="#f5c2e7" stroke-width="1.5"/>
  <text x="476" y="352" font-family="sans-serif" font-size="14">📱</text>
  <text x="496" y="352" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">ChaquopyPythonBridge (hand-authored C++)</text>
  <text x="476" y="375" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">JNI methods call PythonBridge.kt via zig c++</text>

  <!-- Android internal arrows -->
  <line x1="550" y1="290" x2="550" y2="317" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===== Shared panel ===== -->
  <rect x="30" y="515" width="800" height="145" rx="10" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
  <text x="50" y="540" font-family="sans-serif" font-weight="bold" font-size="15" fill="#cba6f7">📊 Shared MVC output (both templates)</text>

  <rect x="50" y="560" width="240" height="70" rx="6" fill="#45475a" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="66" y="587" font-family="sans-serif" font-size="14">⚙️</text>
  <text x="86" y="587" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">PlotController</text>
  <text x="66" y="610" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">Routes evaluate to model cache</text>

  <rect x="310" y="560" width="240" height="70" rx="6" fill="#45475a" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="326" y="587" font-family="sans-serif" font-size="14">🗃️</text>
  <text x="346" y="587" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">FunctionRegistry</text>
  <text x="326" y="610" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">Active curves and samples</text>

  <rect x="570" y="560" width="240" height="70" rx="6" fill="#45475a" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="586" y="587" font-family="sans-serif" font-size="14">📊</text>
  <text x="606" y="587" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">ImPlot draw</text>
  <text x="586" y="610" font-family="sans-serif" font-style="italic" font-size="11" fill="#a6adc8">Renders curves each frame</text>

  <!-- Shared internal arrows -->
  <line x1="290" y1="595" x2="302" y2="595" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="595" x2="562" y2="595" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Desktop to Shared arrows -->
  <path d="M 135,395 L 135,480 L 170,480 L 170,552" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 320,395 L 320,480 L 170,480" fill="none" stroke="#585b70" stroke-width="2"/>

  <!-- Android to Shared arrows -->
  <path d="M 637,395 L 637,480 L 690,480 L 690,552" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="30" y="705" width="800" height="70" rx="8" fill="#313244" stroke="#585b70" stroke-width="1.5"/>
  <text x="50" y="726" font-family="sans-serif" font-weight="bold" font-size="13" fill="#cdd6f4">Python embed layers</text>

  <rect x="50" y="734" width="12" height="12" rx="2" fill="#89b4fa"/>
  <text x="68" y="744" font-family="sans-serif" font-size="11" fill="#bac2de">Desktop — pybind11 + python.dat</text>

  <rect x="310" y="734" width="12" height="12" rx="2" fill="#f5c2e7"/>
  <text x="328" y="744" font-family="sans-serif" font-size="11" fill="#bac2de">Android — Chaquopy + hand-authored JNI</text>

  <rect x="50" y="754" width="12" height="12" rx="2" fill="#cba6f7"/>
  <text x="68" y="764" font-family="sans-serif" font-size="11" fill="#bac2de">Shared — controller → ImPlot</text>
</svg>
