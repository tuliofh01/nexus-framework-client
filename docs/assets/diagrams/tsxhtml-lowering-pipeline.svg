  <text x="140" y="355" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#a6e3a1">Build</text>
  <text x="140" y="380" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a6adc8">zig build</text>
  <text x="260" y="355" font-family="sans-serif" font-size="13" fill="#a6adc8">C++20 module compilation</text>
  <text x="260" y="380" font-family="sans-serif" font-size="13" fill="#a6adc8">Link SDL3 + Lua + Python bridges</text>

  <line x1="350" y1="170" x2="350" y2="185" stroke="#585b70" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="350" y1="290" x2="350" y2="305" stroke="#585b70" stroke-width="2.5" marker-end="url(#arrow)"/>

