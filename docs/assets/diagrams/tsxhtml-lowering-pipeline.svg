<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" width="700" height="600">
  <title>Nexus higher-order flow — abstract</title>
  <rect width="100%" height="100%" fill="#1e1e2e"/>
