  <text x="260" y="140" font-family="sans-serif" font-size="13" fill="#a6adc8">Configure ports and data flow</text>

  <rect x="60" y="190" width="580" height="100" rx="12" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <rect x="60" y="190" width="160" height="100" rx="12" fill="#fab387" opacity="0.15"/>
  <text x="140" y="235" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#fab387">Generate</text>
  <text x="140" y="260" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#a6adc8">:core engine</text>
  <text x="260" y="235" font-family="sans-serif" font-size="13" fill="#a6adc8">ProjectGenerator reads blueprint</text>
  <text x="260" y="260" font-family="sans-serif" font-size="13" fill="#a6adc8">TemplateEngine substitutes placeholders</text>

  <rect x="60" y="310" width="580" height="100" rx="12" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
