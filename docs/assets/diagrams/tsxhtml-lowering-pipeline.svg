<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 480" width="1480" height="480">
  <title>TS/XHTML lowering pipeline</title>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#37474F"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1565C0"/>
    </marker>
    <style>
      .label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; font-weight: 700; }
      .desc { font: italic 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #78909C; }
      .small { font: 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #546E7A; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; font-weight: 700; }
      .legend-title { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #37474F; }
      .layer-label { font: bold 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #263238; }
      .badge { font: bold 11px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1565C0; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #263238; }
      .node { rx: 10; stroke-width: 2.5; }
      .panel { rx: 12; stroke-width: 2.5; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1480" height="100%" fill="#f8f9fa"/>
  <image href="../nexus-logo.png" x="24" y="16" width="40" height="40" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="294" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="146" class="icon">&#xf15b;</text>
  <text x="76" y="148" class="label">
    <tspan x="76" dy="0">ui/ui.xhtml</tspan>
  </text>
  <text x="54" y="167" class="desc">
    <tspan x="54" dy="0">Declarative markup — panels, plots,</tspan>
    <tspan x="54" dy="14">sliders</tspan>
  </text>
  <rect x="40" y="210" width="251" height="78" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="54" y="236" class="icon">&#xf121;</text>
  <text x="76" y="238" class="label">
    <tspan x="76" dy="0">ui/ui.ts</tspan>
  </text>
  <text x="54" y="257" class="desc">
    <tspan x="54" dy="0">state(), native(), invoke()</tspan>
    <tspan x="54" dy="14">bindings</tspan>
  </text>
  <rect x="280" y="160" width="232" height="78" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="294" y="186" class="icon">&#xf5fd;</text>
  <text x="316" y="188" class="label">
    <tspan x="316" dy="0">shared/dsl/</tspan>
  </text>
  <text x="294" y="207" class="desc">
    <tspan x="294" dy="0">tags.ts · components.ts ·</tspan>
    <tspan x="294" dy="14">core.ts</tspan>
  </text>
  <rect x="520" y="160" width="220" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="534" y="186" class="icon">&#xf013;</text>
  <text x="556" y="188" class="label">
    <tspan x="556" dy="0">Lowering pass</tspan>
  </text>
  <text x="534" y="207" class="desc">
    <tspan x="534" dy="0">Maps ComponentTag → draw calls</tspan>
  </text>
  <rect x="760" y="160" width="220" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="774" y="186" class="icon">&#xf120;</text>
  <text x="796" y="188" class="label">
    <tspan x="796" dy="0">panels.lua equiv.</tspan>
  </text>
  <text x="774" y="207" class="desc">
    <tspan x="774" dy="0">nxs.register_panel definitions</tspan>
  </text>
  <rect x="1000" y="160" width="220" height="78" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1014" y="186" class="icon">&#xf120;</text>
  <text x="1036" y="188" class="label">
    <tspan x="1036" dy="0">sol2 runtime</tspan>
  </text>
  <text x="1014" y="207" class="desc">
    <tspan x="1014" dy="0">LuaPanels walks tree each</tspan>
    <tspan x="1014" dy="14">frame</tspan>
  </text>
  <rect x="1240" y="120" width="200" height="72" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1254" y="146" class="icon">&#xf108;</text>
  <text x="1276" y="148" class="label">
    <tspan x="1276" dy="0">Dear ImGui</tspan>
  </text>
  <text x="1254" y="167" class="desc">
    <tspan x="1254" dy="0">window, button, slider, …</tspan>
  </text>
  <rect x="1240" y="210" width="200" height="72" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1254" y="236" class="icon">&#xf080;</text>
  <text x="1276" y="238" class="label">
    <tspan x="1276" dy="0">ImPlot / imnodes</tspan>
  </text>
  <text x="1254" y="257" class="desc">
    <tspan x="1254" dy="0">plot-line, node-editor tags</tspan>
  </text>


  <line x1="240" y1="152" x2="280" y2="176" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="242" x2="280" y2="208" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="192" x2="520" y2="192" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="192" x2="760" y2="192" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="960" y1="192" x2="1000" y2="192" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1220" y1="176" x2="1240" y2="152" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1220" y1="208" x2="1240" y2="242" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="40" y="320" width="1380" height="44" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="730" y="348" text-anchor="middle" class="small">No browser engine — same nxs.* commands as hand-written panels.lua; hot-reload via lua.dat optional</text>

  <rect x="40" y="380" width="1380" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="402" class="legend-title">Lowering stages</text>
  <rect x="56" y="404" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="416" class="small">Authoring — ui.xhtml + ui.ts</text>
  <rect x="746" y="404" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="768" y="416" class="small">DSL — shared tag registry</text>
  <rect x="56" y="426" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="438" class="small">Lua — register_panel output</text>
  <rect x="746" y="426" width="16" height="16" class="legend-box" fill="#ECEFF1" stroke="#455A64"/>
  <text x="768" y="438" class="small">Native — ImGui / ImPlot / imnodes</text>
</svg>