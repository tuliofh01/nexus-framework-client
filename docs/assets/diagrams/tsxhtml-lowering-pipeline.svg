  <text x="560" y="460" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#585b70">Produce binary</text>

  <path d="M350,410 L350,445 L280,445 L280,473" fill="none" stroke="#585b70" stroke-width="2" marker-end="url(#arrow)"/>
