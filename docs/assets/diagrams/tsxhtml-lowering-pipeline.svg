<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1792 582" width="1792" height="582">
  <title>TS/XHTML lowering pipeline</title>
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#94a3b8" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
    <style>
      .label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; font-weight: 700; }
      .desc { font: italic 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #64748b; }
      .small { font: 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #475569; }
      .mono { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; font-weight: 700; }
      .legend-title { font: bold 13px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #334155; }
      .layer-label { font: bold 15px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #1e293b; }
      .badge { font: bold 12px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Verdana, sans-serif; fill: #2563eb; }
      .icon { font: 14px "JetBrainsMono Nerd Font", "Symbols Nerd Font", Consolas, monospace; fill: #1e293b; }
      .node { rx: 10; stroke-width: 2; filter: url(#shadow); }
      .panel { rx: 12; stroke-width: 2; }
      .legend-box { rx: 6; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1792" height="100%" fill="#f8fafc"/>
  <image href="../nexus-logo.png" x="24" y="16" width="36" height="36" preserveAspectRatio="xMidYMid meet"/>
  <rect x="40" y="120" width="307" height="85" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="56" y="149" class="icon">&#xf15b;</text>
  <text x="78" y="151" class="label">
    <tspan x="78" dy="0">ui/ui.xhtml</tspan>
  </text>
  <text x="56" y="171" class="desc">
    <tspan x="56" dy="0">Declarative markup — panels, plots,</tspan>
    <tspan x="56" dy="15">sliders</tspan>
  </text>
  <rect x="40" y="261" width="262" height="85" class="node" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="56" y="290" class="icon">&#xf121;</text>
  <text x="78" y="292" class="label">
    <tspan x="78" dy="0">ui/ui.ts</tspan>
  </text>
  <text x="56" y="312" class="desc">
    <tspan x="56" dy="0">state(), native(), invoke()</tspan>
    <tspan x="56" dy="15">bindings</tspan>
  </text>
  <rect x="403" y="197" width="243" height="85" class="node" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="419" y="226" class="icon">&#xf5fd;</text>
  <text x="441" y="228" class="label">
    <tspan x="441" dy="0">shared/dsl/</tspan>
  </text>
  <text x="419" y="248" class="desc">
    <tspan x="419" dy="0">tags.ts · components.ts ·</tspan>
    <tspan x="419" dy="15">core.ts</tspan>
  </text>
  <rect x="702" y="197" width="224" height="72" class="node" fill="#FFF3E0" stroke="#EF6C00"/>
  <text x="718" y="226" class="icon">&#xf013;</text>
  <text x="740" y="228" class="label">
    <tspan x="740" dy="0">Lowering pass</tspan>
  </text>
  <text x="718" y="248" class="desc">
    <tspan x="718" dy="0">Maps ComponentTag → draw calls</tspan>
  </text>
  <rect x="982" y="197" width="224" height="72" class="node" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="998" y="226" class="icon">&#xf120;</text>
  <text x="1020" y="228" class="label">
    <tspan x="1020" dy="0">panels.lua equiv.</tspan>
  </text>
  <text x="998" y="248" class="desc">
    <tspan x="998" dy="0">nxs.register_panel definitions</tspan>
  </text>
  <rect x="1262" y="197" width="230" height="85" class="node" fill="#E0F7FA" stroke="#00838F"/>
  <text x="1278" y="226" class="icon">&#xf120;</text>
  <text x="1300" y="228" class="label">
    <tspan x="1300" dy="0">sol2 runtime</tspan>
  </text>
  <text x="1278" y="248" class="desc">
    <tspan x="1278" dy="0">LuaPanels walks tree each</tspan>
    <tspan x="1278" dy="15">frame</tspan>
  </text>
  <rect x="1548" y="120" width="200" height="72" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1564" y="149" class="icon">&#xf108;</text>
  <text x="1586" y="151" class="label">
    <tspan x="1586" dy="0">Dear ImGui</tspan>
  </text>
  <text x="1564" y="171" class="desc">
    <tspan x="1564" dy="0">window, button, slider, …</tspan>
  </text>
  <rect x="1548" y="248" width="204" height="85" class="node" fill="#ECEFF1" stroke="#455A64"/>
  <text x="1564" y="277" class="icon">&#xf080;</text>
  <text x="1586" y="279" class="label">
    <tspan x="1586" dy="0">ImPlot / imnodes</tspan>
  </text>
  <text x="1564" y="299" class="desc">
    <tspan x="1564" dy="0">plot-line, node-editor</tspan>
    <tspan x="1564" dy="15">tags</tspan>
  </text>
  <line x1="347" y1="162" x2="403" y2="239" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="302" y1="303" x2="403" y2="239" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="646" y1="239" x2="702" y2="233" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="926" y1="233" x2="982" y2="233" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1206" y1="233" x2="1262" y2="239" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1492" y1="239" x2="1548" y2="156" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1492,239 Q1550,264 1548,290" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="40" y="402" width="1712" height="44" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="896" y="430" text-anchor="middle" class="small">No browser engine — same nxs.* commands as hand-written panels.lua; hot-reload via lua.dat optional</text>
  <rect x="40" y="462" width="1712" height="88" fill="#FFFFFF" stroke="#B0BEC5" stroke-width="2" rx="10"/>
  <text x="56" y="484" class="legend-title">Lowering stages</text>
  <rect x="56" y="486" width="16" height="16" class="legend-box" fill="#E8F5E9" stroke="#2E7D32"/>
  <text x="78" y="498" class="small">Authoring — ui.xhtml + ui.ts</text>
  <rect x="912" y="486" width="16" height="16" class="legend-box" fill="#E3F2FD" stroke="#1565C0"/>
  <text x="934" y="498" class="small">DSL — shared tag registry</text>
  <rect x="56" y="508" width="16" height="16" class="legend-box" fill="#F3E5F5" stroke="#7B1FA2"/>
  <text x="78" y="520" class="small">Lua — register_panel output</text>
  <rect x="912" y="508" width="16" height="16" class="legend-box" fill="#ECEFF1" stroke="#455A64"/>
  <text x="934" y="520" class="small">Native — ImGui / ImPlot / imnodes</text>
</svg>