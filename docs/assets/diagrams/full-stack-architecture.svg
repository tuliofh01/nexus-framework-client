  <text x="634" y="102" class="layer-label">&#xf108; Scaffold client (:app)</text>
  <rect x="640" y="118" width="320" height="72" class="node" fill="#FFFFFF" stroke="#1565C0"/>
  <text x="654" y="144" class="icon">&#xf135;</text>
  <text x="676" y="146" class="label">
    <tspan x="676" dy="0">Generate Project</tspan>
  </text>
  <text x="654" y="165" class="desc">
