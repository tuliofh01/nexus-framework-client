  <rect x="1220" y="500" width="340" height="200" class="panel" fill="#E8F5E9" stroke="#2E7D32" fill-opacity="0.35"/>
  <text x="1234" y="524" class="layer-label">&#xf121; Scripting &amp; UI</text>
