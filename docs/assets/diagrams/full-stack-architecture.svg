  <text x="514" y="582" class="mono">Langflow-style graph</text>
  <text x="492" y="650" class="desc">Edit blueprint in :app; edges wire data flow</text>

  <rect x="820" y="500" width="380" height="380" class="panel" fill="#F3E5F5" stroke="#6A1B9A" fill-opacity="0.35"/>
  <text x="834" y="524" class="layer-label">&#xf466; Generated app — C++ MVC</text>
