  <text x="840" y="524" text-anchor="middle" class="small">declares</text>
  <line x1="760" y1="647" x2="920" y2="647" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="8,5"/>
  <text x="840" y="641" text-anchor="middle" class="small">declares</text>
  <line x1="760" y1="725" x2="920" y2="725" stroke="#37474F" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="8,5"/>
