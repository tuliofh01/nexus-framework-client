  <rect x="1400" y="540" width="140" height="58" class="node" fill="#FFFFFF" stroke="#2E7D32"/>
  <text x="1412" y="562" class="icon">&#xf15b;</text>
  <text x="1434" y="562" class="label">TS/XHTML DSL</text>
  <text x="1412" y="588" class="desc">Declarative UI markup compiled to ImGui</text>

  <rect x="820" y="720" width="380" height="160" class="panel" fill="#ECEFF1" stroke="#455A64" fill-opacity="0.35"/>
  <text x="834" y="744" class="layer-label">&#xf108; Runtime</text>
