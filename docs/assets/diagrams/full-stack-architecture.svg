  <rect x="1020" y="760" width="160" height="58" class="node" fill="#FFFFFF" stroke="#455A64"/>
  <text x="1032" y="782" class="icon">&#xf108;</text>
  <text x="1054" y="782" class="label">SDL3</text>
  <text x="1032" y="808" class="desc">Cross-platform render loop and input</text>

