<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <title>Nexus MVC — compact class diagram</title>
  <rect width="100%" height="100%" fill="#1e1e2e"/>
  <rect x="0" y="0" width="100%" height="36" fill="#313244"/>
  <circle cx="18" cy="18" r="5" fill="#f38ba8"/>
  <circle cx="34" cy="18" r="5" fill="#fab387"/>
  <circle cx="50" cy="18" r="5" fill="#a6e3a1"/>
  <text x="440" y="24" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a6adc8" font-weight="bold">Nexus MVC — class diagram (compact)</text>

  <!-- ====== Controller column ====== -->
  <text x="140" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#89b4fa" font-weight="bold">┌─ Controller Layer ─┐</text>

  <rect x="50" y="90" width="180" height="90" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <path d="M50,118 L230,118" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#89b4fa">GenerateController</text>
  <text x="140" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">- projectName: MutableState</text>
  <text x="140" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">- templateType: MutableState</text>
  <text x="140" y="166" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ generateProject()</text>

  <rect x="50" y="210" width="180" height="90" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <path d="M50,238 L230,238" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="140" y="228" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#89b4fa">CounterController</text>
  <text x="140" y="254" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">- counterModel: CounterModel</text>
  <text x="140" y="270" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ onIncrement()</text>
  <text x="140" y="286" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ onReset()</text>

  <!-- ====== Model column ====== -->
  <text x="440" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fab387" font-weight="bold">┌─ Model Layer ─┐</text>

  <rect x="350" y="90" width="180" height="75" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <path d="M350,118 L530,118" stroke="#fab387" stroke-width="1.5"/>
  <text x="440" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fab387">CounterModel</text>
  <text x="440" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ count: MutableState&lt;Int&gt;</text>
  <text x="440" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ incrementCount() / reset()</text>

  <rect x="350" y="195" width="180" height="75" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <path d="M350,223 L530,223" stroke="#fab387" stroke-width="1.5"/>
  <text x="440" y="213" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fab387">NexusBranding</text>
  <text x="440" y="239" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ title: String</text>
  <text x="440" y="255" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ windowTitle(…)</text>

  <rect x="350" y="300" width="180" height="75" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <path d="M350,328 L530,328" stroke="#fab387" stroke-width="1.5"/>
  <text x="440" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#fab387">TestRunner</text>
  <text x="440" y="344" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ runAll() / passed: Int</text>
  <text x="440" y="360" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ failed: Int</text>

  <!-- ====== View column ====== -->
  <text x="740" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a6e3a1" font-weight="bold">┌─ View Layer ─┐</text>

  <rect x="650" y="90" width="180" height="90" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <path d="M650,118 L830,118" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="740" y="108" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a6e3a1">GenerateProjectScreen</text>
  <text x="740" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ controller: GC</text>
  <text x="740" y="150" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ Scaffold / Column</text>
  <text x="740" y="166" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ GenerateButton</text>

  <rect x="650" y="210" width="180" height="75" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <path d="M650,238 L830,238" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="740" y="228" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="bold" fill="#a6e3a1">CounterView</text>
  <text x="740" y="254" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ controller: CC</text>
  <text x="740" y="270" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#a6adc8">+ Button / Text composable</text>

  <!-- ====== Relationships ====== -->
  <!-- Controller → Model -->
  <line x1="230" y1="140" x2="345" y2="140" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arrow-v)"/>
  <text x="288" y="134" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cba6f7">reads/writes</text>

  <!-- Controller → Model (counter) -->
  <line x1="230" y1="255" x2="345" y2="230" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arrow-v)"/>
  <text x="288" y="248" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cba6f7">reads/writes</text>

  <!-- View → Controller -->
  <line x1="650" y1="135" x2="535" y2="135" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arrow-v)"/>
  <text x="592" y="129" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cba6f7">calls</text>

  <line x1="650" y1="248" x2="535" y2="248" stroke="#cba6f7" stroke-width="1.5" marker-end="url(#arrow-v)"/>
  <text x="592" y="242" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#cba6f7">calls</text>

  <!-- Dependencies :core -->
  <rect x="120" y="340" width="600" height="40" rx="8" fill="none" stroke="#585b70" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="365" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#585b70">:core — ProjectGenerator · TemplateEngine · NexusConfigSchema</text>

  <rect x="120" y="400" width="600" height="40" rx="8" fill="none" stroke="#585b70" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="420" y="425" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#585b70">:cli — FrameworkCli (headless · same :core dependency)</text>

  <text x="440" y="480" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#585b70">MVC in nexus.opensource.{model, view, controller} · Compose Desktop</text>

  <defs>
    <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cba6f7"/>
    </marker>
  </defs>
</svg>
