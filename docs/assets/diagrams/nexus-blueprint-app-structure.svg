<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 650" width="720" height="650">
  <title>Nexus MVC — compact class diagram</title>
  <rect width="100%" height="100%" fill="#1e1e2e"/>
  <rect x="0" y="0" width="100%" height="36" fill="#313244"/>
  <circle cx="18" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="36" cy="18" r="6" fill="#fab387"/>
  <circle cx="54" cy="18" r="6" fill="#a6e3a1"/>
  <text x="360" y="24" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a6adc8" font-weight="bold">Nexus MVC — class diagram (compact)</text>

  <text x="120" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#89b4fa" font-weight="bold">Controller Layer</text>

  <rect x="30" y="100" width="180" height="110" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <path d="M30,130 L210,130" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="120" y="120" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#89b4fa">GenerateController</text>
  <text x="45" y="150" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">- projectName: State</text>
  <text x="45" y="166" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">- templateType: State</text>
  <text x="45" y="182" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">- outputPath: State</text>
  <text x="45" y="198" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ generateProject()</text>

  <rect x="30" y="240" width="180" height="110" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <path d="M30,270 L210,270" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="120" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#89b4fa">CounterController</text>
  <text x="45" y="290" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">- model: CounterModel</text>
  <text x="45" y="306" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ onIncrement()</text>
  <text x="45" y="322" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ onReset()</text>
  <text x="45" y="338" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ onDecrement()</text>

  <text x="360" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fab387" font-weight="bold">Model Layer</text>

  <rect x="270" y="100" width="180" height="95" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <path d="M270,130 L450,130" stroke="#fab387" stroke-width="1.5"/>
  <text x="360" y="120" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fab387">CounterModel</text>
  <text x="285" y="150" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ count: State&lt;Int&gt;</text>
  <text x="285" y="166" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ incrementCount()</text>
  <text x="285" y="182" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ reset()</text>

  <rect x="270" y="225" width="180" height="95" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <path d="M270,255 L450,255" stroke="#fab387" stroke-width="1.5"/>
  <text x="360" y="245" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fab387">NexusBranding</text>
  <text x="285" y="275" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ title: String</text>
  <text x="285" y="291" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ windowTitle(…)</text>

  <rect x="270" y="350" width="180" height="95" rx="8" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <path d="M270,380 L450,380" stroke="#fab387" stroke-width="1.5"/>
  <text x="360" y="370" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fab387">TestRunner</text>
  <text x="285" y="400" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ runAll()</text>
  <text x="285" y="416" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ passed: Int</text>
  <text x="285" y="432" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ failed: Int</text>

  <text x="600" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#a6e3a1" font-weight="bold">View Layer</text>

  <rect x="510" y="100" width="180" height="110" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <path d="M510,130 L690,130" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="600" y="120" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a6e3a1">GenerateScreen</text>
  <text x="525" y="150" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ controller: GC</text>
  <text x="525" y="166" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ Scaffold / Column</text>
  <text x="525" y="182" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ GenerateButton</text>
  <text x="525" y="198" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ TypeSelector</text>

  <rect x="510" y="240" width="180" height="95" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <path d="M510,270 L690,270" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="600" y="260" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a6e3a1">CounterView</text>
  <text x="525" y="290" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ controller: CC</text>
  <text x="525" y="306" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">+ Button / Text</text>

  <rect x="510" y="365" width="180" height="65" rx="8" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <path d="M510,393 L690,393" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="600" y="385" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#a6e3a1">LoadingScreen</text>
  <text x="525" y="412" font-family="monospace, sans-serif" font-size="10" fill="#a6adc8">Flamingo animation</text>

  <line x1="210" y1="155" x2="265" y2="155" stroke="#cba6f7" stroke-width="2" marker-end="url(#arrow-v)"/>
  <text x="238" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cba6f7">reads</text>
  <line x1="210" y1="295" x2="265" y2="265" stroke="#cba6f7" stroke-width="2" marker-end="url(#arrow-v)"/>
  <text x="238" y="286" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cba6f7">reads</text>
  <line x1="510" y1="155" x2="455" y2="155" stroke="#cba6f7" stroke-width="2" marker-end="url(#arrow-v)"/>
  <text x="482" y="148" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cba6f7">calls</text>
  <line x1="510" y1="290" x2="455" y2="290" stroke="#cba6f7" stroke-width="2" marker-end="url(#arrow-v)"/>
  <text x="482" y="283" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#cba6f7">calls</text>

  <rect x="30" y="485" width="660" height="45" rx="8" fill="none" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="360" y="510" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#585b70">:core — ProjectGenerator · TemplateEngine · NexusConfigSchema</text>

  <rect x="30" y="545" width="660" height="45" rx="8" fill="none" stroke="#585b70" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="360" y="570" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#585b70">:cli — FrameworkCli (headless · same :core dependency)</text>

  <text x="360" y="635" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#585b70">MVC in nexus.opensource.{model, view, controller} · Compose Desktop</text>

  <defs>
    <marker id="arrow-v" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#cba6f7"/>
    </marker>
  </defs>
</svg>
