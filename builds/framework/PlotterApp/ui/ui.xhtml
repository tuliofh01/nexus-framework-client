<?xml version="1.0" encoding="UTF-8"?>
<!--
  ui.xhtml — TypeScript/XHTML DSL starter for PlotterApp.

  Tags map onto native ImGui widgets. The Nexus compiler lowers this markup
  (plus ui.ts) into Lua panel definitions equivalent to scripts/panels.lua.
-->
<nexus-ui xmlns="https://nexus.dev/ns/ui/1" controller="./ui.ts#AppPage">
  <panel id="main" title="PlotterApp" fill="true">
    <label text="{greeting}"/>
    <row>
      <label text="Counter: {counter}"/>
      <button label="+" on-click="increment"/>
      <button label="-" on-click="decrement"/>
      <button label="Reset" on-click="reset"/>
    </row>
  </panel>
</nexus-ui>
