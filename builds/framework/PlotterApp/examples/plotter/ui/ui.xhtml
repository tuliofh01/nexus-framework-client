<?xml version="1.0" encoding="UTF-8"?>
<!--
  ui.xhtml — TypeScript/XHTML DSL example for PlotterApp.

  These tags are *abstractions depicting foreign components*: each element
  maps onto a native ImGui/ImPlot widget. No browser engine is involved —
  the Nexus compiler lowers this markup (plus ui.ts) into Lua panel
  definitions equivalent to scripts/panels.lua.

  Tag -> widget mapping used here:
    <panel>         ImGui window            <combo>   ImGui::BeginCombo
    <button>        ImGui::Button           <slider>  ImGui::SliderInt
    <toggle>        ImGui::Checkbox         <plot>    ImPlot::BeginPlot
    <series>        ImPlot::PlotLine        <row>     ImGui::SameLine layout
-->
<nexus-ui xmlns="https://nexus.dev/ns/ui/1" controller="./ui.ts#PlotterPage">
  <panel id="sidebar" title="Functions" width="320">
    <row>
      <combo id="function-picker" items-source="availableFunctions" bind="pendingFunction"/>
      <button label="Add" on-click="addPending"/>
    </row>

    <!-- Repeats once per active curve; `curve` is the loop variable. -->
    <list items-source="activeCurves" as="curve">
      <row>
        <toggle bind="curve.visible"/>
        <color-swatch bind="curve.color"/>
        <label text="{curve.label}"/>
        <button label="x" on-click="remove(curve.id)"/>
      </row>
    </list>

    <slider id="samples" label="samples" min="64" max="4096" bind="sampleCount"
            on-change="resample"/>
    <toggle label="log-scale Y" bind="logScaleY"/>
    <toggle label="grid" bind="showGrid"/>
  </panel>

  <panel id="chart-page" title="PlotterApp" fill="true">
    <plot id="chart" x-label="x" y-label="f(x)" grid="{showGrid}"
          y-scale="{logScaleY ? 'log10' : 'linear'}">
      <series for-each="activeCurves" x="curve.xs" y="curve.ys"
              color="curve.color" label="curve.label"/>
    </plot>
  </panel>
</nexus-ui>
