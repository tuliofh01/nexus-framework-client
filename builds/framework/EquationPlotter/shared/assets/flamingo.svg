<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Flamingo — Nexus Framework mascot -->
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5a0b5"/>
      <stop offset="100%" stop-color="#f38ba8"/>
    </linearGradient>
  </defs>

  <!-- Legs -->
  <path d="M 82 135 L 78 185 M 98 132 L 102 185" stroke="#f38ba8" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="90" cy="105" rx="38" ry="28" fill="url(#bodyGrad)"/>

  <!-- Wing -->
  <path d="M 75 90 Q 90 80 115 95 Q 105 105 85 110 Z" fill="#eba0ac" opacity="0.7"/>

  <!-- Tail feathers -->
  <path d="M 55 108 Q 40 115 48 125 Q 55 118 60 115Z" fill="#f38ba8"/>
  <path d="M 52 105 Q 35 108 40 120 Q 48 112 55 110Z" fill="#f5a0b5" opacity="0.6"/>

  <!-- Neck -->
  <path d="M 115 90 C 130 75 140 55 125 35 C 118 25 105 20 100 15" stroke="url(#bodyGrad)" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="98" cy="12" r="11" fill="#f38ba8"/>

  <!-- Beak -->
  <path d="M 108 12 C 118 12 122 18 118 24 C 115 28 110 25 108 18 Z" fill="#fab387"/>

  <!-- Eye -->
  <circle cx="103" cy="9" r="2.5" fill="#1e1e2e"/>
  <circle cx="103.5" cy="8.5" r="0.8" fill="#ffffff" opacity="0.8"/>
</svg>
